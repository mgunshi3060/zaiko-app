<!DOCTYPE html>
<html lang="ja">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-C5V8H76X6C"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>発注検索</title>
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root {
    --bg:#f4f6f8;--surface:#ffffff;--border:#d0d7de;--accent:#7a4fa0;
    --header-bg:#1e2a38;--text:#1a1f27;--text-muted:#5a6474;--text-dim:#9aa3af;
    --header-h:130px;--status-h:32px;
    --font:'游ゴシック','Yu Gothic','YuGothic','Noto Sans JP',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-weight:500;}
  .header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--header-bg);
    border-bottom:1px solid #0a111a;display:flex;flex-direction:column;justify-content:center;
    gap:6px;padding:8px 12px;z-index:300;}
  .header-row{display:flex;align-items:center;gap:6px;}
  .search-wrap{flex:1;position:relative;min-width:0;}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;color:#9aa3af;}
  .search-input{width:100%;height:28px;background:#2c3a4a;border:1.5px solid #3e5068;border-radius:8px;
    color:#e8edf3;font-family:var(--font);font-size:12px;padding:0 28px 0 28px;outline:none;
    transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
  .search-input:focus{border-color:#c084e0;box-shadow:0 0 0 3px rgba(192,132,224,.18);}
  .search-input::placeholder{color:#5a6474;font-size:11px;}
  .clear-btn{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;
    color:#5a6474;font-size:14px;cursor:pointer;padding:4px 5px;display:none;line-height:1;}
  .clear-btn.visible{display:block;}
  .row-line{display:flex;align-items:center;gap:6px;}
  .row-label{white-space:nowrap;font-size:10px;color:#c084e0;font-weight:700;min-width:28px;}
  .date-input{height:26px;background:#2c3a4a;border:1.5px solid #3e5068;border-radius:7px;color:#e8edf3;
    font-family:var(--font);font-size:11px;padding:0 8px;outline:none;flex:1;min-width:0;
    transition:border-color .2s;-webkit-appearance:none;}
  .date-input:focus{border-color:#c084e0;}
  .tier-input{width:54px;height:26px;background:#2c3a4a;border:1.5px solid #3e5068;border-radius:7px;
    color:#e8edf3;font-family:var(--font);font-size:11px;padding:0 6px;outline:none;text-align:center;
    transition:border-color .2s;-webkit-appearance:none;}
  .tier-input:focus{border-color:#c084e0;}
  .row-sep{color:#5a6474;font-size:11px;flex-shrink:0;}
  .tier-hint{font-size:10px;color:#5a6474;white-space:nowrap;}
  .tier-reset-btn{height:22px;padding:0 10px;background:#3a4f62;border:1px solid #5a6a7a;border-radius:6px;
    color:#c8d4e0;font-size:10px;font-family:var(--font);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .15s;}
  .tier-reset-btn:active{opacity:.7;}
  .search-btn{flex-shrink:0;height:28px;padding:0 14px;background:var(--accent);color:#fff;border:none;
    border-radius:8px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
  .search-btn:active{opacity:0.75;}
  .header-btn-row{display:flex;align-items:center;gap:6px;}
  .hdr-btn{flex:1;height:24px;border:none;border-radius:7px;font-size:10px;font-weight:700;
    font-family:var(--font);cursor:pointer;white-space:nowrap;display:flex;align-items:center;
    justify-content:center;gap:4px;transition:opacity .15s,transform .1s;}
  .hdr-btn:active{opacity:.75;transform:scale(.97);}
  .hdr-btn-reload{background:#2a7f5a;color:#e0f5ec;}
  .hdr-btn-shukka{background:#1a5a38;color:#d0f0e0;}
  .hdr-btn-tanpin{background:#5a4aa0;color:#e8e4ff;}
  .hdr-btn-unit{background:#1a5a70;color:#d8f0ff;}
  #progressWrap{position:fixed;top:var(--header-h);left:0;right:0;height:3px;background:#d0d7de;z-index:400;display:none;}
  #progressBar{height:100%;background:var(--accent);width:0%;transition:width .15s;}
  .status-bar{position:fixed;top:var(--header-h);left:0;right:0;height:var(--status-h);background:var(--surface);
    border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;
    font-size:10px;font-family:var(--font);color:var(--text-muted);z-index:290;overflow:hidden;}
  .status-bar .cnt{color:var(--accent);font-weight:700;}
  .status-tag{background:#eef1f4;border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:10px;white-space:nowrap;}
  .spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #content{padding:calc(var(--header-h) + var(--status-h) + 14px) 12px 32px;}
  .placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;padding:60px 24px;text-align:center;}
  .placeholder .icon{font-size:48px;}
  .placeholder p{font-size:13px;color:var(--text-muted);line-height:1.8;}
  .hint{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;
    font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:8px;}
  .section-title{font-size:11px;font-weight:700;letter-spacing:0.08em;color:var(--text-muted);
    padding:8px 0 6px;border-bottom:2px solid var(--border);margin-bottom:8px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .section-title .badge{background:var(--accent);color:#fff;border-radius:10px;padding:1px 8px;font-size:10px;font-weight:700;}
  .result-block{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden;}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{border-collapse:separate;border-spacing:0;font-size:12px;min-width:100%;font-family:var(--font);white-space:nowrap;}
  thead th{background:#3a4f62;color:#c8d4e0;font-weight:700;font-size:10px;letter-spacing:0.04em;
    padding:7px 12px;border-bottom:2px solid #1a2836;border-right:1px solid #2c3a4a;text-align:center;}
  thead th:last-child{border-right:none;}
  tbody td{padding:8px 12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-size:12px;}
  tbody td:last-child{border-right:none;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:#f0f4f8;}
  .td-right{text-align:right;}.td-center{text-align:center;}.td-left{text-align:left;}
  .c-qty{color:#7a4fa0;font-weight:700;}.c-zero{color:var(--text-dim);}.c-null{color:var(--text-dim);font-size:10px;}
  .badge-flag{display:inline-block;background:rgba(122,79,160,.15);border:1px solid rgba(122,79,160,.4);
    color:#7a4fa0;border-radius:4px;font-size:10px;font-weight:700;padding:1px 6px;}
  .badge-flag-none{display:inline-block;background:rgba(90,100,116,.1);border:1px solid var(--border);
    color:var(--text-dim);border-radius:4px;font-size:10px;padding:1px 6px;}
  .tier-badge{display:inline-block;background:#eef1f4;border:1px solid var(--border);color:var(--text-muted);
    border-radius:3px;font-size:9px;padding:0 5px;min-width:20px;text-align:center;}
  mark{background:rgba(255,220,80,.55);border-radius:2px;padding:0 1px;}
  .no-result{padding:20px;text-align:center;font-size:12px;color:var(--text-dim);}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;
    padding:12px 16px;margin-bottom:12px;display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
  .summary-item{display:flex;flex-direction:column;gap:2px;}
  .summary-label{font-size:10px;color:var(--text-muted);}
  .summary-value{font-size:16px;font-weight:700;color:var(--accent);}
  @media(max-width:480px) and (orientation:portrait){tbody td,thead th{padding:6px 8px;font-size:10px;}.summary-value{font-size:14px;}}
</style>
</head>
<body>
<div class="header">
  <div class="header-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" class="search-input"
        placeholder="部番・製番・手配先・丹愛を入力（空欄可）..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()" aria-label="クリア">✕</button>
    </div>
    <button class="search-btn" onclick="execSearch()">検索</button>
  </div>
  <div class="row-line">
    <span class="row-label">納期</span>
    <input type="date" id="dateFrom" class="date-input">
    <span class="row-sep">〜</span>
    <input type="date" id="dateTo" class="date-input">
  </div>
  <div class="row-line">
    <span class="row-label">階層</span>
    <input type="number" id="tierFrom" class="tier-input" min="0" max="99" placeholder="下限">
    <span class="row-sep">〜</span>
    <input type="number" id="tierTo" class="tier-input" min="0" max="99" placeholder="上限">
    <span class="tier-hint">（空欄＝全階層）</span>
    <button class="tier-reset-btn" onclick="resetTier()">初期値に戻す</button>
  </div>
  <div class="header-btn-row">
    <button class="hdr-btn hdr-btn-reload" onclick="forceReload()">🔄 強制読込</button>
    <button class="hdr-btn hdr-btn-shukka" onclick="window.open('./shukka-search.html','_blank')">📦 出荷検索</button>
    <button class="hdr-btn hdr-btn-tanpin" onclick="window.open('https://mgunshi3060.github.io/zaiko-app/tanpin-search.html','_blank')">⚙️ 単品検索</button>
    <button class="hdr-btn hdr-btn-unit" onclick="window.open('https://mgunshi3060.github.io/zaiko-app/unit-search.html','_blank')">🔍 ユニット検索</button>
  </div>
</div>
<div id="progressWrap"><div id="progressBar"></div></div>
<div class="status-bar"><span id="statusMsg"><span class="spinner"></span>&nbsp;データを読み込んでいます...</span></div>
<div id="content">
  <div class="placeholder" id="placeholder">
    <div class="icon">📋</div>
    <p>部番・製番・手配先などを入力して「検索」またはEnterを押してください<br>キーワードなしで納期・階層だけでも検索できます</p>
    <div class="hint">💡 階層フィルターは初期値2〜3／「初期値に戻す」で2〜3にリセット</div>
  </div>
  <div id="results" style="display:none"></div>
</div>
<script>
'use strict';
const TIER_DEFAULT_FROM=2, TIER_DEFAULT_TO=3;
let hacchuData=[],pgTimer,dataReady=false,jsonUpdatedAt='';

function formatLastModified(v){
  if(!v)return'';const d=new Date(v);if(isNaN(d))return'';
  const p=n=>String(n).padStart(2,'0');
  return`${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}
function normalizeDate(s){return s?String(s).replace(/-/g,'/'):''}
function toComparable(s){return s?String(s).replace(/\//g,'-').slice(0,10):''}
function resetTier(){
  document.getElementById('tierFrom').value=TIER_DEFAULT_FROM;
  document.getElementById('tierTo').value=TIER_DEFAULT_TO;
}

(async function autoLoad(){
  setProgress(true);
  try{
    const r=await fetch('./hacchu.json');
    if(!r.ok)throw'hacchu '+r.status;
    jsonUpdatedAt=formatLastModified(r.headers.get('Last-Modified'));
    const j=await r.json();
    hacchuData=Array.isArray(j)?j:[];
    dataReady=true;setProgress(false);updateStatus();setDefaultDates();resetTier();
  }catch(err){setProgress(false);setStatus(`❌ 読み込み失敗: ${err}`);}
})();

function setDefaultDates(){
  const t=new Date();
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('dateFrom').value=fmt(new Date(t.getFullYear(),t.getMonth()-1,1));
  document.getElementById('dateTo').value=fmt(new Date(t.getFullYear(),t.getMonth()+2,0));
}

async function forceReload(){
  dataReady=false;setProgress(true);
  setStatus('<span class="spinner"></span>&nbsp;データを読み込んでいます...');
  const t=Date.now();
  try{
    const r=await fetch('./hacchu.json?_='+t,{cache:'no-store'});
    if(!r.ok)throw'hacchu '+r.status;
    jsonUpdatedAt=formatLastModified(r.headers.get('Last-Modified'));
    const j=await r.json();
    hacchuData=Array.isArray(j)?j:[];
    dataReady=true;setProgress(false);updateStatus();setDefaultDates();resetTier();
  }catch(err){setProgress(false);setStatus(`❌ 読み込み失敗: ${err}`);}
}

function updateStatus(){
  let h=`発注: <span class="cnt">${hacchuData.length.toLocaleString()}</span>件`;
  if(jsonUpdatedAt)h+=`&nbsp;<span class="status-tag">🕒${jsonUpdatedAt}</span>`;
  h+=`&nbsp;—&nbsp;検索ボタンまたはEnterで検索`;setStatus(h);
}

document.getElementById('searchInput').addEventListener('input',function(){
  document.getElementById('clearBtn').classList.toggle('visible',this.value.length>0);
});
['searchInput','dateFrom','dateTo','tierFrom','tierTo'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();execSearch();}});
});

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('results').style.display='none';
  document.getElementById('results').innerHTML='';
  document.getElementById('placeholder').style.display='flex';
  if(dataReady)updateStatus();
}

function execSearch(){
  if(!dataReady){setStatus('⏳ データ読み込み中です...');return;}
  const keyword=document.getElementById('searchInput').value.trim();
  const dateFrom=document.getElementById('dateFrom').value;
  const dateTo=document.getElementById('dateTo').value;
  const tfv=document.getElementById('tierFrom').value;
  const ttv=document.getElementById('tierTo').value;
  const tierFrom=tfv!==''?Number(tfv):null;
  const tierTo=ttv!==''?Number(ttv):null;
  const resultsDiv=document.getElementById('results');
  const placeholder=document.getElementById('placeholder');

  if(!keyword&&!dateFrom&&!dateTo&&tierFrom===null&&tierTo===null){
    placeholder.style.display='flex';resultsDiv.style.display='none';resultsDiv.innerHTML='';return;
  }
  placeholder.style.display='none';resultsDiv.style.display='block';
  const q=keyword.toLowerCase();

  const filtered=hacchuData.filter(item=>{
    if(keyword){
      const b=(item['部番']||'').toLowerCase();
      const s=(item['製番']||'').toLowerCase();
      const h=(item['手配先']||'').toLowerCase();
      const t=(item['丹愛']||'').toLowerCase();
      if(!b.includes(q)&&!s.includes(q)&&!h.includes(q)&&!t.includes(q))return false;
    }
    const d=toComparable(item['納期']||'');
    if(dateFrom&&d<dateFrom)return false;
    if(dateTo&&d>dateTo)return false;
    const tn=(item['階層']!==null&&item['階層']!==undefined)?Number(item['階層']):null;
    if(tierFrom!==null&&(tn===null||tn<tierFrom))return false;
    if(tierTo!==null&&(tn===null||tn>tierTo))return false;
    return true;
  });

  /* 並び順：部番→納期→発注SEQ */
  filtered.sort((a,b)=>{
    const ba=a['部番']||'',bb=b['部番']||'';
    if(ba<bb)return-1;if(ba>bb)return 1;
    const da=toComparable(a['納期']||''),db=toComparable(b['納期']||'');
    if(da<db)return-1;if(da>db)return 1;
    return(Number(a['発注SEQ'])||0)-(Number(b['発注SEQ'])||0);
  });

  const buf=[];
  const totalHacchu=filtered.reduce((s,r)=>s+(Number(r['発注数'])||0),0);
  const supplierSet=new Set(filtered.map(r=>r['手配先']||''));
  const tierSet=new Set(filtered.map(r=>r['階層']).filter(v=>v!==null&&v!==undefined));
  buf.push(
    `<div class="summary-card">`+
    `<div class="summary-item"><div class="summary-label">件数</div><div class="summary-value">${filtered.length.toLocaleString()}</div></div>`+
    `<div class="summary-item"><div class="summary-label">発注数合計</div><div class="summary-value">${totalHacchu.toLocaleString()}</div></div>`+
    `<div class="summary-item"><div class="summary-label">手配先数</div><div class="summary-value">${supplierSet.size}</div></div>`+
    `<div class="summary-item"><div class="summary-label">対象階層</div><div class="summary-value" style="font-size:13px">${[...tierSet].sort((a,b)=>Number(a)-Number(b)).join(' / ')||'—'}</div></div>`+
    `</div>`
  );
  buf.push(`<div class="section-title">📋 発注情報 <span class="badge">${filtered.length}件</span></div>`);

  if(filtered.length===0){
    buf.push(`<div class="no-result">該当する発注データがありません</div>`);
  }else{
    const COLS=`<th>フラグ</th><th>手配先</th><th>製番</th><th>発注SEQ</th><th>階層</th><th>部番</th><th>丹愛</th><th>発注数</th><th>納期</th><th>個数理論値</th>`;
    let trows='';
    for(const r of filtered){
      const flag=r['フラグ'];
      const haichi=esc(r['手配先']||'');
      const seiban=esc(r['製番']||'');
      const seq=r['発注SEQ']!==null&&r['発注SEQ']!==undefined?esc(String(r['発注SEQ'])):'';
      const tier=r['階層']!==null&&r['階層']!==undefined?r['階層']:'';
      const buban=esc(r['部番']||'');
      const tanai=esc(r['丹愛']||'');
      const hacchu=Number(r['発注数'])||0;
      const nDate=esc(normalizeDate(r['納期']||''));
      const riron=r['個数理論値'];
      const flagStr=(flag!==null&&flag!==undefined&&String(flag).trim()!=='')
        ?`<span class="badge-flag">${esc(String(flag))}</span>`
        :`<span class="badge-flag-none">—</span>`;
      const tierStr=tier!==''?`<span class="tier-badge">${esc(String(tier))}</span>`:`<span class="c-null">—</span>`;
      const hacchuStr=hacchu===0?`<span class="c-zero">0</span>`:`<span class="c-qty">${hacchu.toLocaleString()}</span>`;
      const rironStr=(riron!==null&&riron!==undefined)?Number(riron).toLocaleString():`<span class="c-null">—</span>`;
      trows+=`<tr>`+
        `<td class="td-center">${flagStr}</td>`+
        `<td class="td-left">${hi(haichi,q)}</td>`+
        `<td class="td-left">${hi(seiban,q)}</td>`+
        `<td class="td-center">${seq||'<span class="c-null">—</span>'}</td>`+
        `<td class="td-center">${tierStr}</td>`+
        `<td class="td-left">${hi(buban,q)}</td>`+
        `<td class="td-left">${hi(tanai,q)}</td>`+
        `<td class="td-right">${hacchuStr}</td>`+
        `<td class="td-center">${nDate}</td>`+
        `<td class="td-right">${rironStr}</td>`+
        `</tr>`;
    }
    buf.push(`<div class="result-block"><div class="table-wrap"><table><thead><tr>${COLS}</tr></thead><tbody>${trows}</tbody></table></div></div>`);
  }

  resultsDiv.innerHTML=buf.join('');
  let sh=`発注: <span class="cnt">${filtered.length}</span>件&nbsp;`+`<span class="status-tag">🔍 "${esc(keyword||'全件')}"</span>`;
  if(dateFrom||dateTo)sh+=`&nbsp;<span class="status-tag">📅 ${dateFrom||'—'} 〜 ${dateTo||'—'}</span>`;
  if(tierFrom!==null||tierTo!==null)sh+=`&nbsp;<span class="status-tag">🔢 階層 ${tierFrom!==null?tierFrom:'—'} 〜 ${tierTo!==null?tierTo:'—'}</span>`;
  if(jsonUpdatedAt)sh+=`&nbsp;<span class="status-tag">🕒${jsonUpdatedAt}</span>`;
  setStatus(sh);
}

function setProgress(show){
  const wrap=document.getElementById('progressWrap'),bar=document.getElementById('progressBar');
  clearInterval(pgTimer);
  if(show){wrap.style.display='block';let w=5;bar.style.width=w+'%';
    pgTimer=setInterval(()=>{w=Math.min(w+Math.random()*12,88);bar.style.width=w+'%';},150);
  }else{bar.style.width='100%';setTimeout(()=>{wrap.style.display='none';bar.style.width='0%';},350);}
}
function setStatus(html){document.getElementById('statusMsg').innerHTML=html;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hi(t,q){
  if(!q)return t;
  const qe=esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return t.replace(new RegExp(qe,'gi'),m=>`<mark>${m}</mark>`);
}
</script>
