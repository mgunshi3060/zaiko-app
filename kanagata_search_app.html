<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金型一覧検索</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo','Yu Gothic',sans-serif;font-size:13px;background:#0a1520;color:#c0d0e0}
.header{background:#1a2332;padding:10px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #243346}
.search-box{flex:1;background:#0d1623;border:1px solid #2a3a52;border-radius:6px;display:flex;align-items:center;padding:0 10px;gap:8px}
.search-box input{flex:1;background:transparent;border:none;outline:none;color:#e0e8f0;font-size:13px;padding:8px 0}
.search-box input::placeholder{color:#4a6080}
.btn-search{background:#0f7a5a;color:#fff;border:none;border-radius:6px;padding:8px 20px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.btn-search:hover{background:#0d6b4f}
.subheader{background:#1a2332;padding:8px 16px;display:flex;gap:8px;border-bottom:1px solid #243346;flex-wrap:wrap}
.btn-func{flex:1;min-width:100px;padding:7px 0;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-green{background:#1a6e45;color:#7defa5}
.btn-blue{background:#1a3f6e;color:#6aaaff}
.btn-purple{background:#4a2a7a;color:#c08aff}
.btn-indigo{background:#2a2a6e;color:#8a8aff}
.btn-teal{background:#0e5560;color:#4dd8e8}
.btn-func:hover{filter:brightness(1.2)}

.stats-bar{margin:0 16px 8px;background:#111e2e;border-radius:8px;padding:12px 16px;display:flex;gap:32px;align-items:flex-end;flex-wrap:wrap}
.stat-item .label{font-size:11px;color:#4a6080;margin-bottom:2px}
.stat-item .value{font-size:22px;font-weight:500;color:#e0e8f0}
.stat-item .value.accent{color:#4dd8e8}
.filter-row{margin:0 16px 8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-row input,.filter-row select{background:#111e2e;border:1px solid #2a3a52;border-radius:5px;color:#c0d0e0;font-size:12px;padding:5px 10px;outline:none}
.filter-row input:focus,.filter-row select:focus{border-color:#4a80b0}
.result-header{margin:0 16px 4px;display:flex;align-items:center;gap:8px}
.count-badge{background:#0e4030;color:#4dd8e8;border-radius:12px;padding:2px 10px;font-size:12px;font-weight:500}
.table-wrap{margin:0 16px 16px;overflow-x:auto;border-radius:8px;border:1px solid #1e3048}
table{width:100%;border-collapse:collapse;min-width:900px}
thead tr{background:#1e2e42}
th{padding:9px 12px;text-align:left;font-size:12px;font-weight:500;color:#7a9abf;border-bottom:1px solid #1e3048;white-space:nowrap}
tbody tr{border-bottom:1px solid #131e2c;background:#0d1623}
tbody tr:hover{background:#141f30}
td{padding:8px 12px;font-size:12px;color:#c0d0e0;white-space:nowrap}
td.highlight{color:#f0c040;font-weight:500}
.badge-green{display:inline-block;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:500;background:#0e3a20;color:#4de880;border:1px solid #1a5c30}
.no-data{text-align:center;padding:40px;color:#4a6080}
input[type=file]{display:none}
</style>
</head>
<body>

<div class="header">
  <div class="search-box">
    <input type="text" id="mainSearch" placeholder="部番・品名・管理元・資産NOを検索..." />
  </div>
  <button class="btn-search" onclick="doSearch()">検索</button>
</div>

<div class="subheader">
  <button class="btn-func btn-green" onclick="forceLoad()">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1 0 1.2-3.6M2 4v4h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    強制読込
  </button>
  <button class="btn-func btn-blue" onclick="filterFlag('全て')">全件表示</button>
  <button class="btn-func btn-purple" onclick="filterFlag('社内')">社内金型</button>
  <button class="btn-func btn-teal" onclick="filterFlag('外注')">外注PX</button>
  <button class="btn-func btn-indigo" onclick="clearSearch()">クリア</button>
  <a href="https://mgunshi3060.github.io/zaiko-app/portal-top.html" class="btn-func" style="background:#2a1a1a;color:#ff8a6a;flex:1;min-width:100px;padding:7px 0;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M10 12l-4-4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    メニューに戻る
  </a>
</div>


<div id="statsBar" class="stats-bar" style="display:none">
  <div class="stat-item"><div class="label">件数</div><div class="value accent" id="statCount">0</div></div>
  <div class="stat-item"><div class="label">社内</div><div class="value" id="statShakai">0</div></div>
  <div class="stat-item"><div class="label">外注</div><div class="value" id="statGaichuu">0</div></div>
  <div class="stat-item"><div class="label">部番（ユニーク）</div><div class="value" id="statBuban">0</div></div>
</div>

<div class="filter-row" id="filterRow" style="display:none">
  <input type="text" id="filterBuban" placeholder="部番フィルター" oninput="applyFilters()" style="width:160px">
  <input type="text" id="filterHinmei" placeholder="品名フィルター" oninput="applyFilters()" style="width:160px">
  <input type="text" id="filterKanri" placeholder="管理元フィルター" oninput="applyFilters()" style="width:130px">
  <select id="filterFlag2" onchange="applyFilters()">
    <option value="">フラグ（全て）</option>
    <option value="社内">社内</option>
  </select>
</div>

<div class="result-header" id="resultHeader" style="display:none">
  <span style="color:#7a9abf;font-size:12px">検索結果</span>
  <span class="count-badge" id="resultCount">0件</span>
</div>

<div class="table-wrap" id="tableWrap" style="display:none">
  <table>
    <thead>
      <tr>
        <th>フラグ</th><th>部番</th><th>部材部番</th><th>品名</th><th>置場/加工先</th>
        <th>仕様トン数</th><th>工程数</th><th>工程名称</th><th>金型製造先</th>
        <th>管理元</th><th>資産NO</th><th>資産登録</th><th>所在状況</th><th>備考</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
let allData = [];
let currentFlag = '全て';

function onDataLoaded() {
  populateFlagFilter();
  renderTable(allData);
  updateStats(allData);
  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('filterRow').style.display = 'flex';
}

function forceLoad() {
  fetch('金型一覧統合.json?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => { allData = data; onDataLoaded(); })
    .catch(err => alert('読込失敗: ' + err.message));
}

function populateFlagFilter() {
  const flags = [...new Set(allData.map(r => r['フラグ']).filter(Boolean))];
  const sel = document.getElementById('filterFlag2');
  sel.innerHTML = '<option value="">フラグ（全て）</option>';
  flags.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f; opt.textContent = f; sel.appendChild(opt);
  });
}

function updateStats(data) {
  const shakai = data.filter(r => r['フラグ'] === '社内').length;
  const gaichuu = data.filter(r => r['フラグ'] !== '社内').length;
  const buban = new Set(data.map(r => r['部番']).filter(Boolean)).size;
  document.getElementById('statCount').textContent = data.length.toLocaleString();
  document.getElementById('statShakai').textContent = shakai.toLocaleString();
  document.getElementById('statGaichuu').textContent = gaichuu.toLocaleString();
  document.getElementById('statBuban').textContent = buban.toLocaleString();
}

function doSearch() {
  applyFilters();
}

function clearSearch() {
  document.getElementById('mainSearch').value = '';
  document.getElementById('filterBuban').value = '';
  document.getElementById('filterHinmei').value = '';
  document.getElementById('filterKanri').value = '';
  document.getElementById('filterFlag2').value = '';
  currentFlag = '全て';
  if (allData.length) { renderTable(allData); updateStats(allData); }
}

function filterFlag(flag) {
  currentFlag = flag;
  applyFilters();
}

function applyFilters() {
  if (!allData.length) return;
  const q     = document.getElementById('mainSearch').value.trim().toLowerCase();
  const buban = document.getElementById('filterBuban').value.trim().toLowerCase();
  const hinmei= document.getElementById('filterHinmei').value.trim().toLowerCase();
  const kanri = document.getElementById('filterKanri').value.trim().toLowerCase();
  const flag2 = document.getElementById('filterFlag2').value;

  const result = allData.filter(r => {
    if (currentFlag === '社内' && r['フラグ'] !== '社内') return false;
    if (currentFlag === '外注' && r['フラグ'] === '社内') return false;
    if (flag2 && r['フラグ'] !== flag2) return false;
    if (buban  && !(r['部番']  ||'').toLowerCase().includes(buban))  return false;
    if (hinmei && !(r['品名']  ||'').toLowerCase().includes(hinmei)) return false;
    if (kanri  && !(r['管理元']||'').toLowerCase().includes(kanri))  return false;
    if (q) {
      const t = [r['部番'],r['部材部番'],r['品名'],r['管理元'],r['資産NO'],r['工程名称'],r['金型製造先']].join(' ').toLowerCase();
      if (!t.includes(q)) return false;
    }
    return true;
  });

  renderTable(result, q || buban || hinmei || kanri);
  updateStats(result);
}

function hl(text, q) {
  const s = String(text ?? '');
  if (!q || !s) return s || '-';
  const idx = s.toLowerCase().indexOf(q);
  if (idx < 0) return s || '-';
  return s.slice(0,idx) + '<span style="color:#f0c040;font-weight:500">' + s.slice(idx,idx+q.length) + '</span>' + s.slice(idx+q.length);
}

function renderTable(data, q) {
  document.getElementById('tableWrap').style.display = 'block';
  document.getElementById('resultHeader').style.display = 'flex';
  document.getElementById('resultCount').textContent = data.length + '件';
  const body = document.getElementById('tableBody');

  if (!data.length) {
    body.innerHTML = '<tr><td colspan="14" class="no-data">該当データがありません</td></tr>';
    return;
  }

  body.innerHTML = data.slice(0, 500).map(r => {
    const flag = r['フラグ'] || '';
    const flagColor = flag === '社内' ? '#4dd8e8' : '#c08aff';
    const badge = r['資産登録有無']
      ? `<span class="badge-green">${r['資産登録有無']}</span>`
      : '<span style="color:#4a6080">-</span>';
    return `<tr>
      <td style="color:${flagColor};font-weight:500">${flag}</td>
      <td class="highlight">${hl(r['部番'],q)}</td>
      <td>${hl(r['部材部番'],q)}</td>
      <td>${hl(r['品名'],q)}</td>
      <td>${r['置場']||'-'}</td>
      <td style="text-align:right">${r['仕様トン数']??'-'}</td>
      <td style="text-align:center">${r['工程数']??'-'}</td>
      <td>${r['工程名称']||'-'}</td>
      <td>${r['金型製造先']||'-'}</td>
      <td>${hl(r['管理元'],q)}</td>
      <td>${hl(r['資産NO'],q)}</td>
      <td>${badge}</td>
      <td>${r['所在状況']||'-'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="${(r['備考']||'').replace(/"/g,'&quot;')}">${r['備考']||'-'}</td>
    </tr>`;
  }).join('');

  if (data.length > 500) {
    body.innerHTML += `<tr><td colspan="14" style="text-align:center;color:#4a6080;padding:10px">他 ${data.length-500} 件 — フィルターで絞り込んでください</td></tr>`;
  }
}

document.getElementById('mainSearch').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
