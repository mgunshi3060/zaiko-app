<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>単品在庫、工程順検索</title>
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root {
    --bg:        #f4f6f8;
    --surface:   #ffffff;
    --border:    #d0d7de;
    --border2:   #a0aab5;
    --accent:    #1a7f5a;
    --accent-lt: #e6f4ef;
    --header-bg: #1e2a38;
    --text:      #1a1f27;
    --text-muted:#5a6474;
    --text-dim:  #9aa3af;
    --header-h:  94px;
    --status-h:  32px;
    --font: '游ゴシック','Yu Gothic','YuGothic','Noto Sans JP',sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-weight: 500;
  }

  /* ══ ヘッダー ══ */
  .header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--header-bg);
    border-bottom: 1px solid #0a111a;
    display: flex; flex-direction: column;
    justify-content: center; gap: 6px;
    padding: 8px 12px; z-index: 300;
  }
  .header-row { display: flex; align-items: center; gap: 6px; }

  /* 検索ボタン */
  .search-btn {
    flex-shrink: 0; height: 28px; padding: 0 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-family: var(--font); font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: opacity .15s;
  }
  .search-btn:active { opacity: 0.75; }

  /* ══ ヘッダーボタン行 ══ */
  .header-btn-row { display: flex; align-items: center; gap: 6px; }
  .hdr-btn {
    flex: 1; height: 26px;
    border: none; border-radius: 7px;
    font-size: 11px; font-weight: 700; font-family: var(--font);
    cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: opacity .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .hdr-btn:active { opacity: .75; transform: scale(.97); }
  .hdr-btn-reload { background: #2a7f5a; color: #e0f5ec; }
  .hdr-btn-unit   { background: #5a4aa0; color: #e8e4ff; }

  .search-wrap { flex: 1; position: relative; min-width: 0; }
  .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); font-size: 13px;
    pointer-events: none; color: #9aa3af;
  }
  #searchInput {
    width: 100%; height: 28px;
    background: #2c3a4a; border: 1.5px solid #3e5068;
    border-radius: 8px; color: #e8edf3;
    font-family: var(--font); font-size: 12px;
    padding: 0 28px 0 28px; outline: none;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }
  #searchInput:focus { border-color: #7dd3b0; box-shadow: 0 0 0 3px rgba(125,211,176,.18); }
  #searchInput::placeholder { color: #5a6474; font-size: 11px; }
  #clearBtn {
    position: absolute; right: 7px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; color: #5a6474;
    font-size: 14px; cursor: pointer; padding: 4px 5px;
    display: none; line-height: 1;
  }
  #clearBtn.visible { display: block; }

  /* ══ プログレスバー ══ */
  #progressWrap {
    position: fixed; top: var(--header-h); left: 0; right: 0;
    height: 3px; background: #d0d7de; z-index: 400; display: none;
  }
  #progressBar { height: 100%; background: var(--accent); width: 0%; transition: width .15s; }

  /* ══ ステータスバー ══ */
  .status-bar {
    position: fixed; top: var(--header-h); left: 0; right: 0;
    height: var(--status-h); background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    font-size: 10px; font-family: var(--font);
    color: var(--text-muted); z-index: 290; overflow: hidden;
  }
  .status-bar .cnt { color: var(--accent); font-weight: 700; }
  .status-tag {
    background: #eef1f4; border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 7px; font-size: 10px; white-space: nowrap;
  }
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    display: inline-block; vertical-align: middle; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══ コンテンツエリア ══ */
  #content {
    padding: calc(var(--header-h) + var(--status-h) + 14px) 12px 32px;
  }

  /* ══ 初期ローディング ══ */
  #loadingPlaceholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 60px 24px; text-align: center;
  }
  #loadingPlaceholder .icon { font-size: 48px; }
  #loadingPlaceholder p { font-size: 13px; color: var(--text-muted); line-height: 1.8; }

  /* ══ セクションタイトル ══ */
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 8px 0 6px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
    position: sticky; top: calc(var(--header-h) + var(--status-h));
    background: var(--bg); z-index: 100;
  }
  .section-title .badge {
    background: var(--accent); color: #fff;
    border-radius: 10px; padding: 1px 8px;
    font-size: 10px; font-weight: 700;
  }
  .section-title .badge-count { /* 動的に件数更新する span */ }

  /* ══ 工程情報カード ══ */
  .koutei-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap;
  }
  /* hidden で折りたたむ（display:none より高速） */
  .koutei-card[hidden], .zaiko-block[hidden] { display: none !important; }

  .koutei-code { font-weight: 700; font-size: 13px; color: #1a5c3a; min-width: 120px; }
  .koutei-lot  { font-size: 11px; color: var(--text-muted); min-width: 60px; align-self: center; }
  .koutei-steps { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .koutei-step {
    padding: 3px 10px; background: #eef1f4; border: 1px solid var(--border);
    border-radius: 12px; font-size: 11px; white-space: nowrap;
  }

  /* ══ 在庫ブロック ══ */
  .zaiko-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 12px; overflow: hidden;
  }
  .zaiko-block-header {
    background: #2c3a4a; padding: 8px 14px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .zaiko-buban { font-size: 13px; font-weight: 700; color: #ffffff; }
  .zaiko-busho {
    font-size: 11px; color: #7dd3b0;
    background: rgba(125,211,176,.18); border: 1px solid rgba(125,211,176,.3);
    border-radius: 10px; padding: 2px 10px;
  }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table {
    border-collapse: separate; border-spacing: 0;
    font-size: 12px; min-width: 100%;
    font-family: var(--font); white-space: nowrap;
  }
  thead th {
    background: #3a4f62; color: #c8d4e0;
    font-weight: 700; font-size: 10px; letter-spacing: 0.04em;
    padding: 7px 12px; border-bottom: 2px solid #1a2836;
    border-right: 1px solid #2c3a4a; text-align: center;
  }
  thead th:last-child { border-right: none; }
  tbody td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border); text-align: right; font-size: 12px;
  }
  tbody td:last-child { border-right: none; }
  tbody tr:last-child td { border-bottom: none; }

  /* 土曜・日曜 */
  .c-sat { background: #cce8ff !important; }
  .c-sun { background: #ffd6d6 !important; }
  th.c-sat { color: #1a4070 !important; }
  th.c-sun { color: #701a1a !important; }

  /* 値の色 */
  .c-minus { color: #d93025 !important; font-weight: 700; }
  .c-zero  { color: var(--text-dim); }

  mark { border-radius: 2px; padding: 0 1px; background: none; }
  .koutei-code mark { background: none; color: #1a5c3a; font-weight: 900; text-decoration: underline 2px #1a7f5a; }
  .zaiko-buban mark { background: rgba(255,220,80,.35); color: #ffffff; }

  .no-result-msg {
    padding: 20px; text-align: center;
    font-size: 12px; color: var(--text-dim);
  }

  /* スマホ縦 */
  @media (max-width: 480px) and (orientation: portrait) {
    .koutei-code { font-size: 12px; min-width: 90px; }
    tbody td, thead th { padding: 6px 8px; font-size: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <!-- 第1段：検索バー -->
  <div class="header-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput"
        placeholder="部番・品番を入力..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button id="clearBtn" onclick="clearSearch()" aria-label="クリア">✕</button>
    </div>
    <button class="search-btn" onclick="execSearch()">検索</button>
  </div>
  <!-- 第2段：ボタン行 -->
  <div class="header-btn-row">
    <button class="hdr-btn hdr-btn-reload" onclick="forceReload()">🔄 JSON強制読込</button>
    <button class="hdr-btn hdr-btn-unit" onclick="location.href='https://mgunshi3060.github.io/zaiko-app/unit-search.html'">🔍 ユニット検索</button>
  </div>
</div>

<div id="progressWrap"><div id="progressBar"></div></div>

<div class="status-bar">
  <span id="statusMsg"><span class="spinner"></span>&nbsp;データを読み込んでいます...</span>
</div>

<div id="content">
  <!-- データロード前のローディング表示 -->
  <div id="loadingPlaceholder">
    <div class="icon">⏳</div>
    <p>データを読み込んでいます...</p>
  </div>

  <!-- データロード後にここへ全件レンダリング -->
  <div id="allData" style="display:none">
    <div class="section-title">
      ⚙️ 工程情報
      <span class="badge"><span id="kBadge">0</span>件</span>
      <span id="kOverMsg" style="font-size:10px;color:var(--text-dim);display:none"></span>
    </div>
    <div id="kouteiList"></div>
    <div id="kNoResult" class="no-result-msg" style="display:none">該当する工程情報がありません</div>

    <div class="section-title" style="margin-top:16px">
      📦 在庫情報
      <span class="badge"><span id="zBadge">0</span>件</span>
      <span id="zOverMsg" style="font-size:10px;color:var(--text-dim);display:none"></span>
    </div>
    <div id="zaikoList"></div>
    <div id="zNoResult" class="no-result-msg" style="display:none">該当する在庫データがありません</div>
  </div>
</div>

<script>
'use strict';

let kouteiData  = [];
let zaikoData   = [];
let pgTimer;
let dataReady   = false;
let jsonUpdatedAt = '';

// 検索用のインデックス（小文字キー → DOM要素の参照）
let kElements = []; // [{key, el}]
let zElements = []; // [{key, el}]

// 現在表示中のキーワード（ハイライト管理用）
let currentQuery = '';

/* ── 土日判定 ── */
function getDayType(label) {
  const s = label.replace(/\s/g, '');
  if (s.includes('日)') || s.includes('日）')) return 'sun';
  if (s.includes('土)') || s.includes('土）')) return 'sat';
  return '';
}

/* ── Last-Modified フォーマット ── */
function formatLastModified(headerVal) {
  if (!headerVal) return '';
  const d = new Date(headerVal);
  if (isNaN(d)) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* ── 全データをDOMに一括レンダリング ── */
function renderAll() {
  kElements = [];
  zElements = [];

  const kList = document.getElementById('kouteiList');
  const zList = document.getElementById('zaikoList');
  kList.innerHTML = '';
  zList.innerHTML = '';

  /* 工程情報 */
  const kFrag = document.createDocumentFragment();
  for (const item of kouteiData) {
    const code  = esc(item['品番'] || '');
    const lot   = esc(item['図番'] || '');
    const procs = (item['工程'] || []).filter(p => p && p !== '');
    const steps = procs.map(p => `<span class="koutei-step">${esc(p)}</span>`).join('');

    const div = document.createElement('div');
    div.className = 'koutei-card';
    div.innerHTML =
      `<div class="koutei-code">${code}</div>` +
      `<div class="koutei-lot">${lot}</div>` +
      `<div class="koutei-steps">${steps}</div>`;

    kFrag.appendChild(div);
    kElements.push({ key: (item['品番'] || '').toLowerCase(), el: div });
  }
  kList.appendChild(kFrag);

  /* 在庫情報 */
  const zFrag = document.createDocumentFragment();
  for (const item of zaikoData) {
    const buban = item['部番'] || '';
    const busho = item['部署'] || '';
    const zaiko = item['在庫'] || {};
    const dates = Object.keys(zaiko);

    let thead = '', dayTypes = [];
    for (const d of dates) {
      const day = getDayType(d);
      dayTypes.push(day);
      const cls = day === 'sat' ? ' class="c-sat"' : day === 'sun' ? ' class="c-sun"' : '';
      thead += `<th${cls}>${esc(d)}</th>`;
    }

    let trow = '';
    for (let i = 0; i < dates.length; i++) {
      const raw = zaiko[dates[i]];
      const day = dayTypes[i];
      const dayCls = day === 'sat' ? ' c-sat' : day === 'sun' ? ' c-sun' : '';
      if (raw === null || raw === undefined) {
        trow += `<td class="c-zero${dayCls}">—</td>`;
      } else {
        const num = Math.round(Number(raw));
        if (num < 0)        trow += `<td class="c-minus${dayCls}">▲${Math.abs(num).toLocaleString()}</td>`;
        else if (num === 0) trow += `<td class="c-zero${dayCls}">0</td>`;
        else                trow += `<td class="${dayCls.trim()}">${num.toLocaleString()}</td>`;
      }
    }

    const div = document.createElement('div');
    div.className = 'zaiko-block';
    div.innerHTML =
      `<div class="zaiko-block-header">` +
      `<span class="zaiko-buban">${esc(buban)}</span>` +
      (busho ? `<span class="zaiko-busho">${esc(busho)}</span>` : '') +
      `</div>` +
      `<div class="table-wrap"><table>` +
      `<thead><tr>${thead}</tr></thead>` +
      `<tbody><tr>${trow}</tr></tbody>` +
      `</table></div>`;

    zFrag.appendChild(div);
    zElements.push({ key: buban.toLowerCase(), el: div });
  }
  zList.appendChild(zFrag);

  /* バッジ更新 */
  document.getElementById('kBadge').textContent = kouteiData.length.toLocaleString();
  document.getElementById('zBadge').textContent = zaikoData.length.toLocaleString();

  /* 表示切替 */
  document.getElementById('loadingPlaceholder').style.display = 'none';
  document.getElementById('allData').style.display = 'block';
}

/* ── 2ファイル並列fetch（自動読み込み） ── */
(async function autoLoad() {
  setProgress(true);
  try {
    const [rk, rz] = await Promise.all([
      fetch('./koutei.json'),
      fetch('./zaiko.json'),
    ]);
    if (!rk.ok) throw 'koutei ' + rk.status;
    if (!rz.ok) throw 'zaiko '  + rz.status;
    jsonUpdatedAt = formatLastModified(rz.headers.get('Last-Modified'));
    const [kj, zj] = await Promise.all([rk.json(), rz.json()]);
    kouteiData = Array.isArray(kj) ? kj : [];
    zaikoData  = Array.isArray(zj) ? zj : [];
    dataReady  = true;
    renderAll();
    setProgress(false);
    updateStatus();
  } catch(err) {
    setProgress(false);
    document.getElementById('loadingPlaceholder').innerHTML =
      `<div class="icon">❌</div><p>読み込み失敗: ${esc(String(err))}</p>`;
    setStatus(`❌ 読み込み失敗: ${err}`);
  }
})();

/* ── JSON強制読込（キャッシュ無効） ── */
async function forceReload() {
  dataReady = false;
  setProgress(true);
  setStatus('<span class="spinner"></span>&nbsp;データを読み込んでいます...');
  const t = Date.now();
  try {
    const [rk, rz] = await Promise.all([
      fetch('./koutei.json?_=' + t, { cache: 'no-store' }),
      fetch('./zaiko.json?_='  + t, { cache: 'no-store' }),
    ]);
    if (!rk.ok) throw 'koutei ' + rk.status;
    if (!rz.ok) throw 'zaiko '  + rz.status;
    jsonUpdatedAt = formatLastModified(rz.headers.get('Last-Modified'));
    const [kj, zj] = await Promise.all([rk.json(), rz.json()]);
    kouteiData = Array.isArray(kj) ? kj : [];
    zaikoData  = Array.isArray(zj) ? zj : [];
    dataReady  = true;
    currentQuery = '';
    document.getElementById('searchInput').value = '';
    document.getElementById('clearBtn').classList.remove('visible');
    renderAll();
    setProgress(false);
    updateStatus();
  } catch(err) {
    setProgress(false);
    setStatus(`❌ 読み込み失敗: ${err}`);
  }
}

/* ── ステータス更新（全件表示時） ── */
function updateStatus() {
  let h = `工程: <span class="cnt">${kouteiData.length.toLocaleString()}</span>件&nbsp;`
        + `在庫: <span class="cnt">${zaikoData.length.toLocaleString()}</span>件`;
  if (jsonUpdatedAt) h += `&nbsp;<span class="status-tag">🕒${jsonUpdatedAt}</span>`;
  h += `&nbsp;—&nbsp;検索ボタンまたはEnterで絞り込み`;
  setStatus(h);
}

/* ── 入力イベント（クリアボタン表示のみ・検索は行わない） ── */
document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('clearBtn').classList.toggle('visible', this.value.length > 0);
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); execSearch(); }
});

/* ── フィルタ適用（超高速：DOM属性切り替えのみ） ── */
function applyFilter(keyword) {
  const q = keyword.toLowerCase();

  // ハイライト解除（前回分）
  if (currentQuery) {
    clearHighlights();
  }
  currentQuery = q;

  if (!q) {
    // 全件表示に戻す
    for (const {el} of kElements) el.removeAttribute('hidden');
    for (const {el} of zElements) el.removeAttribute('hidden');
    document.getElementById('kBadge').textContent  = kouteiData.length.toLocaleString();
    document.getElementById('zBadge').textContent  = zaikoData.length.toLocaleString();
    document.getElementById('kNoResult').style.display = 'none';
    document.getElementById('zNoResult').style.display = 'none';
    document.getElementById('kOverMsg').style.display  = 'none';
    document.getElementById('zOverMsg').style.display  = 'none';
    updateStatus();
    return;
  }

  let kVis = 0, zVis = 0;
  const K_LIMIT = 50, Z_LIMIT = 50;

  for (const {key, el} of kElements) {
    if (key.includes(q) && kVis < K_LIMIT) {
      el.removeAttribute('hidden');
      applyHighlight(el.querySelector('.koutei-code'), q);
      kVis++;
    } else {
      el.setAttribute('hidden', '');
    }
  }
  for (const {key, el} of zElements) {
    if (key.includes(q) && zVis < Z_LIMIT) {
      el.removeAttribute('hidden');
      applyHighlight(el.querySelector('.zaiko-buban'), q);
      zVis++;
    } else {
      el.setAttribute('hidden', '');
    }
  }

  const kTotal = kElements.filter(({key}) => key.includes(q)).length;
  const zTotal = zElements.filter(({key}) => key.includes(q)).length;

  document.getElementById('kBadge').textContent = kTotal.toLocaleString();
  document.getElementById('zBadge').textContent = zTotal.toLocaleString();

  const kOver = kTotal > K_LIMIT;
  const zOver = zTotal > Z_LIMIT;
  const kOMsg = document.getElementById('kOverMsg');
  const zOMsg = document.getElementById('zOverMsg');
  kOMsg.textContent = kOver ? `（上位${K_LIMIT}件表示）` : '';
  kOMsg.style.display = kOver ? 'inline' : 'none';
  zOMsg.textContent = zOver ? `（上位${Z_LIMIT}件表示）` : '';
  zOMsg.style.display = zOver ? 'inline' : 'none';

  document.getElementById('kNoResult').style.display = kVis === 0 ? 'block' : 'none';
  document.getElementById('zNoResult').style.display = zVis === 0 ? 'block' : 'none';

  let sh = `工程: <span class="cnt">${kTotal}</span>件&nbsp;`
         + `在庫: <span class="cnt">${zTotal}</span>件&nbsp;`
         + `<span class="status-tag">🔍 "${esc(keyword)}"</span>`;
  if (jsonUpdatedAt) sh += `&nbsp;<span class="status-tag">🕒${jsonUpdatedAt}</span>`;
  setStatus(sh);
}

/* ── ハイライト適用（テキストノード直接操作） ── */
function applyHighlight(el, q) {
  if (!el || !q) return;
  const text = el.textContent;
  const idx  = text.toLowerCase().indexOf(q);
  if (idx === -1) return;
  const before = esc(text.slice(0, idx));
  const match  = esc(text.slice(idx, idx + q.length));
  const after  = esc(text.slice(idx + q.length));
  el.innerHTML = `${before}<mark>${match}</mark>${after}`;
}

/* ── ハイライト解除（innerHTML を元のテキストに戻す） ── */
function clearHighlights() {
  for (const {el} of kElements) {
    const codeEl = el.querySelector('.koutei-code');
    if (codeEl && codeEl.querySelector('mark')) {
      codeEl.textContent = codeEl.textContent; // mark除去（テキストは保持）
    }
  }
  for (const {el} of zElements) {
    const bubanEl = el.querySelector('.zaiko-buban');
    if (bubanEl && bubanEl.querySelector('mark')) {
      bubanEl.textContent = bubanEl.textContent;
    }
  }
}

/* ── 検索ボタン / Enter（applyFilter と同一処理） ── */
function execSearch() {
  if (!dataReady) { setStatus('⏳ データ読み込み中です...'); return; }
  const keyword = document.getElementById('searchInput').value.trim();
  applyFilter(keyword);
  window.scrollTo(0, 0);
}

/* ── クリア ── */
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  if (dataReady) applyFilter('');
}

/* ── プログレスバー ── */
function setProgress(show) {
  const wrap = document.getElementById('progressWrap');
  const bar  = document.getElementById('progressBar');
  clearInterval(pgTimer);
  if (show) {
    wrap.style.display = 'block'; let w = 5; bar.style.width = w + '%';
    pgTimer = setInterval(() => { w = Math.min(w + Math.random() * 12, 88); bar.style.width = w + '%'; }, 150);
  } else {
    bar.style.width = '100%';
    setTimeout(() => { wrap.style.display = 'none'; bar.style.width = '0%'; }, 350);
  }
}

function setStatus(html) { document.getElementById('statusMsg').innerHTML = html; }

/* ── ユーティリティ ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
