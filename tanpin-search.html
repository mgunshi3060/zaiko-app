<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>工程情報／在庫検索</title>
<link rel="icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root {
    --bg:        #f4f6f8;
    --surface:   #ffffff;
    --border:    #d0d7de;
    --border2:   #a0aab5;
    --accent:    #1a7f5a;
    --accent-lt: #e6f4ef;
    --header-bg: #1e2a38;
    --text:      #1a1f27;
    --text-muted:#5a6474;
    --text-dim:  #9aa3af;
    --header-h:  94px;
    --status-h:  32px;
    --font: '游ゴシック','Yu Gothic','YuGothic','Noto Sans JP',sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-weight: 500;
  }

  /* ══ ヘッダー ══ */
  .header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--header-bg);
    border-bottom: 1px solid #0a111a;
    display: flex; flex-direction: column;
    justify-content: center; gap: 6px;
    padding: 8px 12px; z-index: 300;
  }
  .header-row { display: flex; align-items: center; gap: 6px; }

  /* 検索ボタン */
  .search-btn {
    flex-shrink: 0; height: 28px; padding: 0 12px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-family: var(--font); font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: opacity .15s;
  }
  .search-btn:active { opacity: 0.75; }

  /* ══ ヘッダーボタン行 ══ */
  .header-btn-row { display: flex; align-items: center; gap: 6px; }
  .hdr-btn {
    flex: 1; height: 26px;
    border: none; border-radius: 7px;
    font-size: 11px; font-weight: 700; font-family: var(--font);
    cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: opacity .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .hdr-btn:active { opacity: .75; transform: scale(.97); }
  .hdr-btn-reload { background: #2a7f5a; color: #e0f5ec; }
  .hdr-btn-unit   { background: #5a4aa0; color: #e8e4ff; }

  .search-wrap { flex: 1; position: relative; min-width: 0; }
  .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); font-size: 13px;
    pointer-events: none; color: #9aa3af;
  }
  #searchInput {
    width: 100%; height: 28px;
    background: #2c3a4a; border: 1.5px solid #3e5068;
    border-radius: 8px; color: #e8edf3;
    font-family: var(--font); font-size: 12px;
    padding: 0 28px 0 28px; outline: none;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }
  #searchInput:focus { border-color: #7dd3b0; box-shadow: 0 0 0 3px rgba(125,211,176,.18); }
  #searchInput::placeholder { color: #5a6474; font-size: 11px; }
  #clearBtn {
    position: absolute; right: 7px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; color: #5a6474;
    font-size: 14px; cursor: pointer; padding: 4px 5px;
    display: none; line-height: 1;
  }
  #clearBtn.visible { display: block; }

  /* ══ プログレスバー ══ */
  #progressWrap {
    position: fixed; top: var(--header-h); left: 0; right: 0;
    height: 3px; background: #d0d7de; z-index: 400; display: none;
  }
  #progressBar { height: 100%; background: var(--accent); width: 0%; transition: width .15s; }

  /* ══ ステータスバー ══ */
  .status-bar {
    position: fixed; top: var(--header-h); left: 0; right: 0;
    height: var(--status-h); background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    font-size: 10px; font-family: var(--font);
    color: var(--text-muted); z-index: 290; overflow: hidden;
  }
  .status-bar .cnt { color: var(--accent); font-weight: 700; }
  .status-tag {
    background: #eef1f4; border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 7px; font-size: 10px; white-space: nowrap;
  }
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    display: inline-block; vertical-align: middle; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══ コンテンツエリア ══ */
  #content {
    padding: calc(var(--header-h) + var(--status-h) + 14px) 12px 32px;
  }

  /* ══ 初期表示 ══ */
  .placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 60px 24px; text-align: center;
  }
  .placeholder .icon { font-size: 48px; }
  .placeholder p { font-size: 13px; color: var(--text-muted); line-height: 1.8; }
  .hint {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px;
    font-size: 12px; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
  }

  /* ══ セクションタイトル ══ */
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 8px 0 6px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .badge {
    background: var(--accent); color: #fff;
    border-radius: 10px; padding: 1px 8px;
    font-size: 10px; font-weight: 700;
  }

  /* ══ 工程情報カード ══ */
  .koutei-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap;
  }
  .koutei-code { font-weight: 700; font-size: 13px; color: #1a5c3a; min-width: 120px; }
  .koutei-lot  { font-size: 11px; color: var(--text-muted); min-width: 60px; align-self: center; }
  .koutei-steps { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .koutei-step {
    padding: 3px 10px; background: #eef1f4; border: 1px solid var(--border);
    border-radius: 12px; font-size: 11px; white-space: nowrap;
  }
  .koutei-extra {
    width: 100%; display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 4px; padding-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .koutei-extra-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-muted);
  }
  .koutei-extra-label {
    background: #e8f0fe; border: 1px solid #b8cef8; color: #2a5ab0;
    border-radius: 4px; padding: 1px 6px; font-size: 10px; font-weight: 700;
    white-space: nowrap;
  }
  .koutei-extra-label.kata { background: #fef3e2; border-color: #f5c97a; color: #8a5a00; }
  .koutei-extra-val { color: var(--text); font-weight: 500; }

  /* ══ 在庫ブロック ══ */
  .zaiko-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 12px; overflow: hidden;
  }
  .zaiko-block-header {
    background: #2c3a4a; padding: 8px 14px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .zaiko-buban { font-size: 13px; font-weight: 700; color: #ffffff; }  /* ← 緑から白に変更 */
  .zaiko-busho {
    font-size: 11px; color: #7dd3b0;
    background: rgba(125,211,176,.18); border: 1px solid rgba(125,211,176,.3);
    border-radius: 10px; padding: 2px 10px;
  }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table {
    border-collapse: separate; border-spacing: 0;
    font-size: 12px; min-width: 100%;
    font-family: var(--font); white-space: nowrap;
  }
  thead th {
    background: #3a4f62; color: #c8d4e0;
    font-weight: 700; font-size: 10px; letter-spacing: 0.04em;
    padding: 7px 12px; border-bottom: 2px solid #1a2836;
    border-right: 1px solid #2c3a4a; text-align: center;
  }
  thead th:last-child { border-right: none; }
  tbody td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border); text-align: right; font-size: 12px;
  }
  tbody td:last-child { border-right: none; }
  tbody tr:last-child td { border-bottom: none; }

  /* 土曜・日曜 */
  .c-sat { background: #cce8ff !important; }
  .c-sun { background: #ffd6d6 !important; }
  th.c-sat { color: #1a4070 !important; }
  th.c-sun { color: #701a1a !important; }

  /* 値の色 */
  .c-minus { color: #d93025 !important; font-weight: 700; }
  .c-zero  { color: var(--text-dim); }

  mark { border-radius: 2px; padding: 0 1px; background: none; }
  .koutei-code mark { background: none; color: #1a5c3a; font-weight: 900; text-decoration: underline 2px #1a7f5a; }
  .zaiko-buban mark { background: rgba(255,220,80,.35); color: #ffffff; }

  .no-result {
    padding: 20px; text-align: center;
    font-size: 12px; color: var(--text-dim);
  }

  /* スマホ縦 */
  @media (max-width: 480px) and (orientation: portrait) {
    .koutei-code { font-size: 12px; min-width: 90px; }
    tbody td, thead th { padding: 6px 8px; font-size: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <!-- 第1段：検索バー -->
  <div class="header-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput"
        placeholder="部番・品番を入力..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button id="clearBtn" onclick="clearSearch()" aria-label="クリア">✕</button>
    </div>
    <button class="search-btn" onclick="execSearch()">検索</button>
  </div>
  <!-- 第2段：ボタン行 -->
  <div class="header-btn-row">
    <button class="hdr-btn hdr-btn-reload" onclick="forceReload()">🔄 JSON強制読込</button>
    <button class="hdr-btn hdr-btn-unit" onclick="window.open('https://mgunshi3060.github.io/zaiko-app/unit-search.html','_blank')">🔍 ユニット検索</button>
  </div>
</div>

<div id="progressWrap"><div id="progressBar"></div></div>

<div class="status-bar">
  <span id="statusMsg"><span class="spinner"></span>&nbsp;データを読み込んでいます...</span>
</div>

<div id="content">
  <div class="placeholder" id="placeholder">
    <div class="icon">🔍</div>
    <p>部番または品番を入力して<br>「検索」または Enter を押してください</p>
    <div class="hint">💡 部番の一部でも検索できます</div>
  </div>
  <div id="results" style="display:none"></div>
</div>

<script>
'use strict';

let kouteiData  = [];
let zaikoData   = [];
let pgTimer;
let dataReady   = false;
let jsonUpdatedAt = ''; // JSON更新日時（zaiko.jsonのLast-Modified）

/* ── 土日判定 ── */
function getDayType(label) {
  const s = label.replace(/\s/g, '');
  if (s.includes('日)') || s.includes('日）')) return 'sun';
  if (s.includes('土)') || s.includes('土）')) return 'sat';
  return '';
}

/* ── Last-Modified フォーマット ── */
function formatLastModified(headerVal) {
  if (!headerVal) return '';
  const d = new Date(headerVal);
  if (isNaN(d)) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* ── 2ファイル並列fetch（自動読み込み） ── */
(async function autoLoad() {
  setProgress(true);
  try {
    const [rk, rz] = await Promise.all([
      fetch('./koutei.json'),
      fetch('./zaiko.json'),
    ]);
    if (!rk.ok) throw 'koutei ' + rk.status;
    if (!rz.ok) throw 'zaiko '  + rz.status;
    jsonUpdatedAt = formatLastModified(rz.headers.get('Last-Modified'));
    const [kj, zj] = await Promise.all([rk.json(), rz.json()]);
    kouteiData = Array.isArray(kj) ? kj : [];
    zaikoData  = Array.isArray(zj) ? zj : [];
    dataReady  = true;
    setProgress(false);
    updateStatus();
  } catch(err) {
    setProgress(false);
    setStatus(`❌ 読み込み失敗: ${err}`);
  }
})();

/* ── JSON強制読込（キャッシュ無効） ── */
async function forceReload() {
  dataReady = false;
  setProgress(true);
  setStatus('<span class="spinner"></span>&nbsp;データを読み込んでいます...');
  const t = Date.now();
  try {
    const [rk, rz] = await Promise.all([
      fetch('./koutei.json?_=' + t, { cache: 'no-store' }),
      fetch('./zaiko.json?_='  + t, { cache: 'no-store' }),
    ]);
    if (!rk.ok) throw 'koutei ' + rk.status;
    if (!rz.ok) throw 'zaiko '  + rz.status;
    jsonUpdatedAt = formatLastModified(rz.headers.get('Last-Modified'));
    const [kj, zj] = await Promise.all([rk.json(), rz.json()]);
    kouteiData = Array.isArray(kj) ? kj : [];
    zaikoData  = Array.isArray(zj) ? zj : [];
    dataReady  = true;
    setProgress(false);
    updateStatus();
  } catch(err) {
    setProgress(false);
    setStatus(`❌ 読み込み失敗: ${err}`);
  }
}

/* ── ステータス更新 ── */
function updateStatus() {
  let h = `工程: <span class="cnt">${kouteiData.length.toLocaleString()}</span>件&nbsp;`
        + `在庫: <span class="cnt">${zaikoData.length.toLocaleString()}</span>件`;
  if (jsonUpdatedAt) h += `&nbsp;<span class="status-tag">🕒${jsonUpdatedAt}</span>`;
  h += `&nbsp;—&nbsp;検索ボタンまたはEnterで検索`;
  setStatus(h);
}

/* ── 入力イベント（クリアボタン表示のみ） ── */
document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('clearBtn').classList.toggle('visible', this.value.length > 0);
});
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); execSearch(); }
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('placeholder').style.display = 'flex';
  if (dataReady) updateStatus();
}

/* ── 検索実行（ボタン or Enter） ── */
function execSearch() {
  if (!dataReady) { setStatus('⏳ データ読み込み中です...'); return; }

  const keyword     = document.getElementById('searchInput').value.trim();
  const resultsDiv  = document.getElementById('results');
  const placeholder = document.getElementById('placeholder');

  if (!keyword) {
    placeholder.style.display = 'flex';
    resultsDiv.style.display = 'none';
    resultsDiv.innerHTML = '';
    return;
  }

  placeholder.style.display = 'none';
  resultsDiv.style.display = 'block';
  window.scrollTo(0, 0);

  const q = keyword.toLowerCase();
  const kFiltered = kouteiData.filter(item =>
    (item['品番']   || '').toLowerCase().includes(q) ||
    (item['類似部品'] || '').toLowerCase().includes(q) ||
    (item['型共通']  || '').toLowerCase().includes(q)
  );
  const zFiltered = zaikoData .filter(item => (item['部番'] || '').toLowerCase().includes(q));

  const K_LIMIT = 50, Z_LIMIT = 50;
  const kOver = kFiltered.length > K_LIMIT;
  const zOver = zFiltered.length > Z_LIMIT;
  const kShow = kOver ? kFiltered.slice(0, K_LIMIT) : kFiltered;
  const zShow = zOver ? zFiltered.slice(0, Z_LIMIT) : zFiltered;

  const buf = [];

  /* 工程情報 */
  buf.push(`<div class="section-title">⚙️ 工程情報 <span class="badge">${kFiltered.length}件</span>${kOver ? `<span style="font-size:10px;color:var(--text-dim)">（上位${K_LIMIT}件表示）</span>` : ''}</div>`);
  if (kShow.length === 0) {
    buf.push(`<div class="no-result">該当する工程情報がありません</div>`);
  } else {
    for (const item of kShow) {
      const code  = esc(item['品番'] || '');
      const lot   = esc(item['図番'] || '');
      const procs = (item['工程'] || []).filter(p => p && p !== '');
      const steps = procs.map(p => `<span class="koutei-step">${esc(p)}</span>`).join('');
      const ruiji = item['類似部品'] || '';
      const kata  = item['型共通']   || '';
      const extraItems = [];
      if (ruiji) extraItems.push(
        `<span class="koutei-extra-item">` +
        `<span class="koutei-extra-label">類似部品</span>` +
        `<span class="koutei-extra-val">${hi(esc(ruiji), q)}</span>` +
        `</span>`
      );
      if (kata) extraItems.push(
        `<span class="koutei-extra-item">` +
        `<span class="koutei-extra-label kata">型共通</span>` +
        `<span class="koutei-extra-val">${hi(esc(kata), q)}</span>` +
        `</span>`
      );
      const extraHtml = extraItems.length
        ? `<div class="koutei-extra">${extraItems.join('')}</div>` : '';
      buf.push(
        `<div class="koutei-card">` +
        `<div class="koutei-code">${hi(code, q)}</div>` +
        `<div class="koutei-lot">${lot}</div>` +
        `<div class="koutei-steps">${steps}</div>` +
        extraHtml +
        `</div>`
      );
    }
  }

  /* 在庫情報 */
  buf.push(`<div class="section-title" style="margin-top:16px">📦 在庫情報 <span class="badge">${zFiltered.length}件</span>${zOver ? `<span style="font-size:10px;color:var(--text-dim)">（上位${Z_LIMIT}件表示）</span>` : ''}</div>`);
  if (zShow.length === 0) {
    buf.push(`<div class="no-result">該当する在庫データがありません</div>`);
  } else {
    for (const item of zShow) {
      const buban = item['部番'] || '';
      const busho = item['部署'] || '';
      const zaiko = item['在庫'] || {};
      const dates = Object.keys(zaiko);

      let thead = '', dayTypes = [];
      for (const d of dates) {
        const day = getDayType(d);
        dayTypes.push(day);
        const cls = day === 'sat' ? ' class="c-sat"' : day === 'sun' ? ' class="c-sun"' : '';
        thead += `<th${cls}>${esc(d)}</th>`;
      }

      let trow = '';
      for (let i = 0; i < dates.length; i++) {
        const raw = zaiko[dates[i]];
        const day = dayTypes[i];
        const dayCls = day === 'sat' ? ' c-sat' : day === 'sun' ? ' c-sun' : '';
        if (raw === null || raw === undefined) {
          trow += `<td class="c-zero${dayCls}">—</td>`;
        } else {
          const num = Math.round(Number(raw));
          if (num < 0)        trow += `<td class="c-minus${dayCls}">▲${Math.abs(num).toLocaleString()}</td>`;
          else if (num === 0) trow += `<td class="c-zero${dayCls}">0</td>`;
          else                trow += `<td class="${dayCls.trim()}">${num.toLocaleString()}</td>`;
        }
      }

      buf.push(
        `<div class="zaiko-block">` +
        `<div class="zaiko-block-header">` +
        `<span class="zaiko-buban">${hi(esc(buban), q)}</span>` +
        (busho ? `<span class="zaiko-busho">${esc(busho)}</span>` : '') +
        `</div>` +
        `<div class="table-wrap"><table>` +
        `<thead><tr>${thead}</tr></thead>` +
        `<tbody><tr>${trow}</tr></tbody>` +
        `</table></div></div>`
      );
    }
  }

  resultsDiv.innerHTML = buf.join('');

  let sh = `工程: <span class="cnt">${kFiltered.length}</span>件&nbsp;`
         + `在庫: <span class="cnt">${zFiltered.length}</span>件&nbsp;`
         + `<span class="status-tag">🔍 "${esc(keyword)}"</span>`;
  if (jsonUpdatedAt) sh += `&nbsp;<span class="status-tag">🕒${jsonUpdatedAt}</span>`;
  setStatus(sh);
}

/* ── プログレスバー ── */
function setProgress(show) {
  const wrap = document.getElementById('progressWrap');
  const bar  = document.getElementById('progressBar');
  clearInterval(pgTimer);
  if (show) {
    wrap.style.display = 'block'; let w = 5; bar.style.width = w + '%';
    pgTimer = setInterval(() => { w = Math.min(w + Math.random() * 12, 88); bar.style.width = w + '%'; }, 150);
  } else {
    bar.style.width = '100%';
    setTimeout(() => { wrap.style.display = 'none'; bar.style.width = '0%'; }, 350);
  }
}

function setStatus(html) { document.getElementById('statusMsg').innerHTML = html; }

/* ── ユーティリティ ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hi(escapedText, query) {
  if (!query) return escapedText;
  const q = esc(query).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return escapedText.replace(new RegExp(q,'gi'), m => `<mark>${m}</mark>`);
}
