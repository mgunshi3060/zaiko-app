<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫検索</title>

<style>
body {
  font-family: sans-serif;
  padding: 5px;
  background: #f5f5f5;
}

h2 {
  text-align: center;
  margin: 5px;
}

input {
  width: 65%;
  padding: 8px;
  font-size: 16px;
}

button {
  padding: 8px;
  font-size: 16px;
}

.result-block {
  margin-top: 10px;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
  background: white;
}

th, td {
  padding: 5px;
  border: 1px solid #ddd;
  font-size: 11px;
  white-space: nowrap;
}

.today {
  background: #ffe082;
}

.danger {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>在庫検索</h2>

<input type="text" id="search" placeholder="子品目コード">
<button onclick="searchData()">検索</button>

<div id="result"></div>

<script>
let data = [];

// JSON読み込み
fetch("zaiko.json")
  .then(res => res.json())
  .then(json => data = json);

// 今日（日付＋曜日）
function getToday() {
  const d = new Date();
  const weekdays = ["日","月","火","水","木","金","土"];
  const w = weekdays[d.getDay()];
  return (d.getMonth()+1) + "/" + d.getDate() + "(" + w + ")";
}

// 検索
function searchData() {

  const keyword = document.getElementById("search").value
                    .trim()
                    .toLowerCase();

  const result = document.getElementById("result");
  result.innerHTML = "";

  const filtered = data.filter(item =>
    item["子品目コード"]
      .toLowerCase()
      .includes(keyword)
  );

console.log(Object.keys(data[0]["在庫"])); // JSONの日付一覧
console.log("today:", getToday());        // 今日の日付

  const today = getToday();

  filtered.forEach(item => {

    let html = `
      <div class="result-block">
        <b>${item["子品目コード"]}（${item["工程"]}）</b>
        <div class="table-wrap">
        <table><tr>
    `;

    const dates = Object.keys(item["在庫"]);

    // ヘッダー
    dates.forEach(d => {
      html += `<th class="${d === today ? 'today' : ''}">${d}</th>`;
    });

    html += "</tr><tr>";

    // データ
    dates.forEach(d => {
      let value = item["在庫"][d];
      let display = value ?? "";
      let cls = "";

      if (value < 0) {
        cls = "danger";
        display = "▲" + Math.abs(value);
      }

      if (d === today) cls += " today";

      html += `<td class="${cls}">${display}</td>`;
    });

    html += "</tr></table></div></div>";

    result.innerHTML += html;

  });
}
</script>

</body>
</html>
