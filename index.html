<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>在庫検索</title>

<style>
body{
  font-family: sans-serif;
  background:#f2f2f2;
  padding:20px;
}

h1{
  text-align:center;
}

#processBox{
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:6px;
  font-size:18px;
}

#searchArea{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:500px;
  padding:10px;
  font-size:18px;
}

button{
  padding:10px 20px;
  font-size:16px;
}

.item{
  background:#fff;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td{
  border:1px solid #ddd;
  text-align:center;
  padding:6px;
}
</style>
</head>

<body>

<h1>工程情報</h1>

<!-- ここに工程表示（検索バーの上） -->
<div id="processBox">
工程情報はここに表示されます
</div>

<div id="searchArea">
<input id="search" placeholder="品番検索">
<button onclick="search()">検索</button>
</div>

<div id="result"></div>

<script>
/*
在庫データ
*/
let zaikoData = [];

/*
工程データ
*/
let kouteiData = [];

/*
JSON読み込み（キャッシュ防止）
*/
fetch("zaiko.json?v=" + Date.now())
.then(r => r.json())
.then(data => {
  zaikoData = data;
});

fetch("koutei.json?v=" + Date.now())
.then(r => r.json())
.then(data => {
  kouteiData = data;
});

/*
検索処理
部分一致
*/
function search(){

  const word = document.getElementById("search").value.toLowerCase();
  const result = document.getElementById("result");
  const processBox = document.getElementById("processBox");

  result.innerHTML = "";

  /*
  工程検索（部分一致）
  */
  let koutei = kouteiData.find(k =>
    k["品番"] &&
    k["品番"].toLowerCase().includes(word)
  );

  if(koutei){
    const processList = Object.keys(koutei)
      .filter(x => x !== "品番")
      .map(x => koutei[x])
      .filter(x => x);

    processBox.innerHTML =
      "<b>" + koutei["品番"] + "</b> ： " +
      processList.join(" → ");
  }else{
    processBox.innerHTML = "工程情報なし";
  }

  /*
  在庫検索
  */
  const filtered = zaikoData.filter(item =>
    item["子品目コード"] &&
    item["子品目コード"].toLowerCase().includes(word)
  );

  filtered.forEach(item => {

    const div = document.createElement("div");
    div.className = "item";

    let html = "<b>" + item["子品目コード"] + "</b>";

    if(item["データ"]){
      html += "<table><tr>";

      item["データ"].forEach(d=>{
        html += "<td>" + d + "</td>";
      });

      html += "</tr></table>";
    }

    div.innerHTML = html;
    result.appendChild(div);
  });

}
</script>

</body>
</html>
