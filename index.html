<!--
在庫検索アプリ
・zaiko.json と koutei.json を読み込み
・子品目コードから工程を自動表示
・GitHub Pages対応（キャッシュ対策）
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫検索</title>

<style>
body {
  font-family: sans-serif;
  padding: 5px;
  background: #f5f5f5;
}

h2 {
  text-align: center;
  margin: 5px;
}

input {
  width: 65%;
  padding: 8px;
  font-size: 16px;
}

button {
  padding: 8px;
  font-size: 16px;
}

.result-block {
  margin-top: 10px;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
  background: white;
}

th, td {
  padding: 5px;
  border: 1px solid #ddd;
  font-size: 11px;
  white-space: nowrap;
}

.sunday { background: #ffdddd; }
.saturday { background: #ddeeff; }

.danger {
  color: red;
  font-weight: bold;
}

.flow {
  margin: 10px 0;
  padding: 8px;
  background: #eee;
  border-radius: 5px;
  font-size: 12px;
}
</style>
</head>

<body>

<h2>在庫検索</h2>

<input type="text" id="search" placeholder="子品目コード">
<button onclick="searchData()">検索</button>

<div id="result"></div>

<script>

/*
データ格納
*/
let data = [];
let kouteiMap = {};

/*
在庫JSON読み込み
キャッシュ防止付き（GitHub Pages対策）
*/
fetch("zaiko.json?v=" + Date.now())
  .then(res => res.json())
  .then(json => {
    data = json;
    console.log("在庫データ読み込みOK");
  });

/*
工程JSON読み込み
品番をキーにMap化（高速検索）
*/
fetch("koutei.json?v=" + Date.now())
  .then(res => res.json())
  .then(json => {

    json.forEach(k => {
      if (k["品番"]) {
        kouteiMap[k["品番"].toLowerCase()] = k;
      }
    });

    console.log("工程Map作成OK", kouteiMap);
  });

/*
検索処理
*/
function searchData() {

  const keyword = document.getElementById("search").value
                    .trim()
                    .toLowerCase();

  const result = document.getElementById("result");
  result.innerHTML = "";

  if (!keyword) {
    result.innerHTML = "検索ワードを入力してください";
    return;
  }

  const filtered = data.filter(item =>
    item["子品目コード"]
      .toLowerCase()
      .includes(keyword)
  );

  if (filtered.length === 0) {
    result.innerHTML = "該当なし";
    return;
  }

  filtered.forEach(item => {

    /*
    子品目コードから工程取得
    */
    let koutei = null;

    for (const key in kouteiMap) {
      if (item["子品目コード"].toLowerCase().includes(key)) {
        koutei = kouteiMap[key];
        break;
      }
    }

    let html = `<div class="result-block">`;

    /*
    工程表示
    */
    if (koutei) {
      html += `
        <div class="flow">
          <b>工程：</b> ${koutei["工程"].filter(x => x).join(" → ")}
        </div>
      `;
    }

    /*
    タイトル
    */
    html += `
      <b>${item["子品目コード"]}（${item["工程"]}）</b>
      <div class="table-wrap">
      <table><tr>
    `;

    const dates = Object.keys(item["在庫"]);

    /*
    日付ヘッダー
    */
    dates.forEach(d => {
      let cls = "";
      const clean = d.replace(/\s/g, "");

      if (clean.includes("日")) cls = "sunday";
      if (clean.includes("土")) cls = "saturday";

      html += `<th class="${cls}">${d}</th>`;
    });

    html += "</tr><tr>";

    /*
    在庫データ
    */
    dates.forEach(d => {
      let value = item["在庫"][d];
      let display = value ?? "";
      let cls = "";

      if (value < 0) {
        cls = "danger";
        display = "▲" + Math.abs(value);
      }

      html += `<td class="${cls}">${display}</td>`;
    });

    html += "</tr></table></div></div>";

    result.innerHTML += html;

  });
}
</script>

</body>
</html>
