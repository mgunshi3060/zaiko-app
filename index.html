<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程情報 / 在庫検索</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: sans-serif;
  padding: 10px;
  background: #f5f5f5;
  font-size: 14px;
}

h2 {
  text-align: center;
  font-size: 16px;
  font-weight: bold;
  margin: 0 0 10px 0;
}

/* ===== 検索エリア ===== */
.search-row {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  justify-content: center;
}
.search-row input {
  width: 60%;
  padding: 8px;
  font-size: 15px;
  border: 1px solid #ccc;
  border-radius: 3px;
}
.search-row button {
  padding: 8px 14px;
  font-size: 15px;
  cursor: pointer;
  background: #fff;
  border: 1px solid #aaa;
  border-radius: 3px;
}
.search-row button:hover { background: #e8e8e8; }

/* ===== 工程情報 ===== */
#koutei-result {
  background: white;
  border: 1px solid #ccc;
  padding: 8px 12px;
  margin-bottom: 12px;
  display: none; /* 初期非表示 */
}
.koutei-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 13px;
  padding: 3px 0;
}
.koutei-code { font-weight: bold; min-width: 120px; }
.koutei-lot  { min-width: 55px; color: #555; }
.koutei-processes { display: flex; gap: 4px; flex-wrap: wrap; }
.koutei-step {
  padding: 2px 8px;
  background: #f0f0f0;
  border: 1px solid #ccc;
  border-radius: 3px;
  font-size: 12px;
}

/* ===== 在庫テーブル ===== */
.result-block { margin-top: 12px; }
.result-block b { display: block; margin-bottom: 4px; font-size: 13px; }
.table-wrap { overflow-x: auto; }
table {
  border-collapse: collapse;
  text-align: center;
  background: white;
  font-size: 11px;
  white-space: nowrap;
}
th, td { padding: 5px 8px; border: 1px solid #ddd; }
.sunday   { background: #ffdddd; }
.saturday { background: #ddeeff; }
.danger   { color: red; font-weight: bold; }
</style>
</head>
<body>

<h2>工程情報在庫情報検索</h2>

<!-- 検索 -->
<div class="search-row">
  <input type="text" id="search" placeholder="部番（例：FE4）">
  <button onclick="searchData()">検索</button>
</div>

<!-- 工程情報結果（検索後に表示） -->
<div id="koutei-result"></div>

<!-- 在庫検索結果 -->
<div id="zaiko-result"></div>

<script>
let kouteiData = [];
let zaikoData  = [];

// ===== koutei.json 読み込み =====
fetch("koutei.json")
  .then(res => res.json())
  .then(json => { kouteiData = json; })
  .catch(err => console.error("koutei.json エラー:", err));

// ===== zaiko.json 読み込み =====
fetch("zaiko.json")
  .then(res => res.json())
  .then(json => { zaikoData = json; })
  .catch(err => console.error("zaiko.json エラー:", err));

// ===== 検索 =====
function searchData() {
  const keyword = document.getElementById("search").value.trim().toLowerCase();
  const kouteiDiv = document.getElementById("koutei-result");
  const zaikoDiv  = document.getElementById("zaiko-result");

  kouteiDiv.innerHTML = "";
  zaikoDiv.innerHTML  = "";
  kouteiDiv.style.display = "none";

  if (!keyword) {
    zaikoDiv.innerHTML = "検索ワードを入力してください";
    return;
  }

  // --- 工程情報 ---
  const kFiltered = kouteiData.filter(item =>
    (item["品番"] || "").toLowerCase().includes(keyword)
  );
  if (kFiltered.length > 0) {
    kouteiDiv.style.display = "block";
    kFiltered.forEach(item => {
      const code  = item["品番"] || "";
      const lot   = item["図番"] || "";
      const procs = (item["工程"] || []).filter(p => p !== "");
      const stepsHtml = procs.map(p =>
        `<span class="koutei-step">${p}</span>`
      ).join("");
      kouteiDiv.innerHTML += `
        <div class="koutei-row">
          <span class="koutei-code">${code}</span>
          <span class="koutei-lot">${lot}</span>
          <div class="koutei-processes">${stepsHtml}</div>
        </div>
      `;
    });
  }

  // --- 在庫テーブル ---
  const zFiltered = zaikoData.filter(item =>
    (item["部番"] || "").toLowerCase().includes(keyword)
  );
  if (zFiltered.length === 0) {
    zaikoDiv.innerHTML = kFiltered.length > 0 ? "在庫データなし" : "該当なし";
    return;
  }
  zFiltered.forEach(item => {
    const dates = Object.keys(item["在庫"] || {});

    const headerCells = dates.map(d => {
      const clean = d.replace(/\s/g, "");
      let cls = "";
      if (clean.includes("日")) cls = "sunday";
      else if (clean.includes("土")) cls = "saturday";
      return `<th class="${cls}">${d}</th>`;
    }).join("");

    const dataCells = dates.map(d => {
      const value = item["在庫"][d];
      if (value == null) return `<td></td>`;
      const num = Math.round(value);
      if (num < 0) return `<td class="danger">▲${Math.abs(num)}</td>`;
      return `<td>${num}</td>`;
    }).join("");

    zaikoDiv.innerHTML += `
      <div class="result-block">
        <b>${item["部番"]}（${item["工程"] || ""}）</b>
        <div class="table-wrap">
          <table>
            <tr>${headerCells}</tr>
            <tr>${dataCells}</tr>
          </table>
        </div>
      </div>
    `;
  });
}

// Enterキーで検索
document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") searchData();
});
</script>
</body>
</html>
