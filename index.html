<!--
在庫検索アプリ
部分一致で工程を取得する版
GitHub Pages対応
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫検索</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
  background: #f5f5f5;
}

h2 {
  text-align: center;
}

input {
  width: 80%;
  padding: 8px;
  font-size: 16px;
}

button {
  padding: 8px;
  font-size: 16px;
}

.result-block {
  margin-top: 20px;
}

.flow {
  background: #eee;
  padding: 10px;
  border-radius: 5px;
  margin-bottom: 5px;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  font-size: 12px;
  text-align: center;
}

.saturday { background: #dce9ff; }
.sunday { background: #ffdede; }

.danger {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>在庫検索</h2>

<input type="text" id="search" placeholder="子品目コード">
<button onclick="searchData()">検索</button>

<div id="result"></div>

<script>

/*
在庫データ
*/
let zaikoData = [];

/*
工程データ
*/
let kouteiData = [];

/*
JSON読み込み
*/
Promise.all([
  fetch("zaiko.json?v=" + Date.now()).then(r => r.json()),
  fetch("koutei.json?v=" + Date.now()).then(r => r.json())
]).then(([z, k]) => {
  zaikoData = z;
  kouteiData = k;
  console.log("JSON読み込みOK");
});

/*
工程取得（部分一致）
*/
function getKoutei(code) {

  return kouteiData.find(k =>
    code.toLowerCase().includes(
      k["品番"].toLowerCase()
    )
  );

}

/*
検索
*/
function searchData() {

  const keyword = document
    .getElementById("search")
    .value
    .trim()
    .toLowerCase();

  const result = document.getElementById("result");
  result.innerHTML = "";

  if (!keyword) {
    result.innerHTML = "検索ワードを入力してください";
    return;
  }

  const filtered = zaikoData.filter(item =>
    item["子品目コード"]
      .toLowerCase()
      .includes(keyword)
  );

  if (filtered.length === 0) {
    result.innerHTML = "該当なし";
    return;
  }

  filtered.forEach(item => {

    const koutei = getKoutei(item["子品目コード"]);

    let html = `<div class="result-block">`;

    /*
    工程表示
    */
    if (koutei) {
      html += `
      <div class="flow">
        <b>工程：</b>
        ${koutei["工程"]
          .filter(x => x)
          .join(" → ")}
      </div>`;
    }

    /*
    タイトル
    */
    html += `
    <b>${item["子品目コード"]}（${item["工程"]}）</b>
    <div class="table-wrap">
    <table>
    <tr>
    `;

    const dates = Object.keys(item["在庫"]);

    /*
    日付ヘッダ
    */
    dates.forEach(d => {

      let cls = "";
      const clean = d.replace(/\s/g, "");

      if (clean.includes("土")) cls = "saturday";
      if (clean.includes("日")) cls = "sunday";

      html += `<th class="${cls}">${d}</th>`;
    });

    html += "</tr><tr>";

    /*
    在庫
    */
    dates.forEach(d => {

      let value = item["在庫"][d];
      let display = value ?? "";
      let cls = "";

      if (value < 0) {
        cls = "danger";
        display = "▲" + Math.abs(value);
      }

      html += `<td class="${cls}">${display}</td>`;
    });

    html += `
    </tr>
    </table>
    </div>
    </div>
    `;

    result.innerHTML += html;

  });
}

</script>

</body>
</html>
