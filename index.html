<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在庫検索</title>

<style>
body {
  font-family: sans-serif;
  padding: 5px;
  background: #f5f5f5;
}

h2 {
  text-align: center;
  margin: 5px;
}

input {
  width: 65%;
  padding: 8px;
  font-size: 16px;
}

button {
  padding: 8px;
  font-size: 16px;
}

.result-block {
  margin-top: 10px;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  text-align: center;
  background: white;
}

th, td {
  padding: 5px;
  border: 1px solid #ddd;
  font-size: 11px;
  white-space: nowrap;
}

/* 土日色 */
.sunday {
  background: #ffdddd;
}

.saturday {
  background: #ddeeff;
}

/* マイナス */
.danger {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>在庫検索</h2>

<input type="text" id="search" placeholder="子品目コード">
<button onclick="searchData()">検索</button>

<div id="result"></div>

<script>
let data = [];

// JSON読み込み
fetch("zaiko.json")
  .then(res => res.json())
  .then(json => {
    data = json;
    console.log("JSON OK", data);
  })
  .catch(err => {
    console.error("JSONエラー", err);
  });

// 検索
function searchData() {

  const keyword = document.getElementById("search").value
                    .trim()
                    .toLowerCase();

  const result = document.getElementById("result");
  result.innerHTML = "";

  if (!keyword) {
    result.innerHTML = "検索ワードを入力してください";
    return;
  }

  const filtered = data.filter(item =>
    item["子品目コード"]
      .toLowerCase()
      .includes(keyword)
  );

  if (filtered.length === 0) {
    result.innerHTML = "該当なし";
    return;
  }

  filtered.forEach(item => {

    let html = `
      <div class="result-block">
        <b>${item["子品目コード"]}（${item["工程"]}）</b>
        <div class="table-wrap">
        <table><tr>
    `;

    const dates = Object.keys(item["在庫"]);

    // ▼ 日付ヘッダー（土日色分け：全角/半角対応）
    dates.forEach(d => {
      let cls = "";

      const clean = d.replace(/\s/g, "");

      if (clean.includes("日")) cls = "sunday";
      if (clean.includes("土")) cls = "saturday";

      html += `<th class="${cls}">${d}</th>`;
    });

    html += "</tr><tr>";

    // ▼ データ
    dates.forEach(d => {
      let value = item["在庫"][d];
      let display = value ?? "";
      let cls = "";

      if (value < 0) {
        cls = "danger";
        display = "▲" + Math.abs(value);
      }

      html += `<td class="${cls}">${display}</td>`;
    });

    html += "</tr></table></div></div>";

    result.innerHTML += html;

  });
}
</script>

</body>
</html>
