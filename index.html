<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程情報 / 在庫検索</title>
<style>
* { box-sizing: border-box; }
body {
  font-family: sans-serif;
  padding: 10px;
  background: #f5f5f5;
  font-size: 14px;
}

/* ===== 工程情報 ===== */
#koutei-section {
  background: white;
  border: 1px solid #ccc;
  padding: 8px 12px;
  margin-bottom: 12px;
}
#koutei-section h2 {
  text-align: center;
  font-size: 16px;
  margin: 0 0 8px 0;
  font-weight: bold;
}
#koutei-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.koutei-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 13px;
}
.koutei-code { font-weight: bold; min-width: 90px; }
.koutei-lot  { min-width: 40px; color: #333; }
.koutei-processes { display: flex; gap: 4px; flex-wrap: wrap; }
.koutei-step {
  padding: 2px 8px;
  background: #f0f0f0;
  border: 1px solid #ccc;
  border-radius: 3px;
  font-size: 12px;
}

/* ===== 在庫検索 ===== */
#zaiko-section h2 {
  text-align: center;
  font-size: 16px;
  margin: 4px 0 8px 0;
}
.search-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.search-row input {
  flex: 1;
  padding: 8px;
  font-size: 15px;
  border: 1px solid #ccc;
  border-radius: 3px;
}
.search-row button {
  padding: 8px 14px;
  font-size: 15px;
  cursor: pointer;
  background: #fff;
  border: 1px solid #aaa;
  border-radius: 3px;
}
.search-row button:hover { background: #e8e8e8; }

/* ===== 結果テーブル ===== */
.result-block { margin-top: 12px; }
.result-block b { display: block; margin-bottom: 4px; font-size: 13px; }
.table-wrap { overflow-x: auto; }
table {
  border-collapse: collapse;
  text-align: center;
  background: white;
  font-size: 11px;
  white-space: nowrap;
}
th, td { padding: 5px 8px; border: 1px solid #ddd; }
.sunday   { background: #ffdddd; }
.saturday { background: #ddeeff; }
.danger   { color: red; font-weight: bold; }
</style>
</head>
<body>

<!-- 工程情報 -->
<div id="koutei-section">
  <h2>工程情報</h2>
  <div id="koutei-list">読み込み中...</div>
</div>

<!-- 在庫検索 -->
<div id="zaiko-section">
  <h2>在庫検索</h2>
  <div class="search-row">
    <input type="text" id="search" placeholder="子品目コード（例：FE4）">
    <button onclick="searchData()">検索</button>
  </div>
  <div id="result"></div>
</div>

<script>
let zaikoData = [];

// ===== koutei.json 読み込み =====
fetch("koutei.json")
  .then(res => res.json())
  .then(json => {
    const list = document.getElementById("koutei-list");
    if (!json || json.length === 0) {
      list.innerHTML = "工程データなし";
      return;
    }
    list.innerHTML = "";
    json.forEach(item => {
      const code  = item["品目コード"] || item["code"] || "";
      const lot   = item["ロット"]     || item["lot"]  || "";
      const procs = item["工程"]       || item["processes"] || [];

      const stepsHtml = procs.map(p =>
        `<span class="koutei-step">${p}</span>`
      ).join("");

      list.innerHTML += `
        <div class="koutei-row">
          <span class="koutei-code">${code}</span>
          <span class="koutei-lot">${lot}</span>
          <div class="koutei-processes">${stepsHtml}</div>
        </div>
      `;
    });
  })
  .catch(err => {
    document.getElementById("koutei-list").innerHTML = "工程データ読み込みエラー";
    console.error("koutei.json エラー:", err);
  });

// ===== zaiko.json 読み込み =====
fetch("zaiko.json")
  .then(res => res.json())
  .then(json => {
    zaikoData = json;
    console.log("zaiko.json OK", zaikoData.length, "件");
  })
  .catch(err => {
    console.error("zaiko.json エラー:", err);
  });

// ===== 検索 =====
function searchData() {
  const keyword = document.getElementById("search").value.trim().toLowerCase();
  const result  = document.getElementById("result");
  result.innerHTML = "";

  if (!keyword) {
    result.innerHTML = "検索ワードを入力してください";
    return;
  }

  const filtered = zaikoData.filter(item =>
    (item["子品目コード"] || "").toLowerCase().includes(keyword)
  );

  if (filtered.length === 0) {
    result.innerHTML = "該当なし";
    return;
  }

  filtered.forEach(item => {
    const dates = Object.keys(item["在庫"] || {});

    const headerCells = dates.map(d => {
      const clean = d.replace(/\s/g, "");
      let cls = "";
      if (clean.includes("日")) cls = "sunday";
      else if (clean.includes("土")) cls = "saturday";
      return `<th class="${cls}">${d}</th>`;
    }).join("");

    const dataCells = dates.map(d => {
      const value = item["在庫"][d];
      if (value == null) return `<td></td>`;
      if (value < 0)     return `<td class="danger">▲${Math.abs(value)}</td>`;
      return `<td>${value}</td>`;
    }).join("");

    result.innerHTML += `
      <div class="result-block">
        <b>${item["子品目コード"]}（${item["工程"] || ""}）</b>
        <div class="table-wrap">
          <table>
            <tr>${headerCells}</tr>
            <tr>${dataCells}</tr>
          </table>
        </div>
      </div>
    `;
  });
}

// Enterキーで検索
document.getElementById("search").addEventListener("keydown", e => {
  if (e.key === "Enter") searchData();
});
</script>
</body>
</html>
