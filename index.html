<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>在庫検索</title>

<style>
body{
  font-family:sans-serif;
  background:#f2f2f2;
  padding:20px;
}

h1{
  text-align:center;
}

.sectionTitle{
  font-size:22px;
  margin-top:20px;
  margin-bottom:10px;
}

#processBox{
  background:#fff;
  padding:15px;
  border-radius:6px;
  margin-bottom:20px;
}

#searchArea{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:500px;
  padding:10px;
  font-size:18px;
}

button{
  padding:10px 20px;
}

.item{
  background:#fff;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td{
  border:1px solid #ddd;
  padding:6px;
  text-align:center;
}

.dateRow{
  background:#fafafa;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>工程情報</h1>

<div id="processBox">
検索するとここに工程が表示されます
</div>

<div class="sectionTitle">在庫情報</div>

<div id="searchArea">
<input id="search" placeholder="品番検索">
<button onclick="search()">検索</button>
</div>

<div id="result"></div>

<script>
/*
在庫 + 工程 データ格納
*/
let zaikoData = [];
let kouteiData = [];

/*
JSON読み込み
*/
fetch("zaiko.json?v=" + Date.now())
.then(r => r.json())
.then(data => {
  zaikoData = data;
});

fetch("koutei.json?v=" + Date.now())
.then(r => r.json())
.then(data => {
  kouteiData = data;
});

/*
検索処理（部分一致）
*/
function search(){

  const word = document.getElementById("search").value.toLowerCase();
  const result = document.getElementById("result");
  const processBox = document.getElementById("processBox");

  result.innerHTML = "";

  /*
  工程検索
  */
  let koutei = kouteiData.find(k =>
    k["品番"] &&
    k["品番"].toLowerCase().includes(word)
  );

  if(koutei){
    const processList = Object.keys(koutei)
      .filter(x => x !== "品番")
      .map(x => koutei[x])
      .filter(x => x);

    processBox.innerHTML =
      "<b>" + koutei["品番"] + "</b> ： " +
      processList.join(" → ");
  }else{
    processBox.innerHTML = "工程情報なし";
  }

  /*
  在庫検索
  */
  const filtered = zaikoData.filter(item =>
    item["子品目コード"] &&
    item["子品目コード"].toLowerCase().includes(word)
  );

  filtered.forEach(item => {

    const div = document.createElement("div");
    div.className = "item";

    let html = "<b>" + item["子品目コード"] + "</b>";

    /*
    日付 + 数量テーブル
    */
    if(item["日付"] && item["数量"]){

      html += "<table>";

      html += "<tr class='dateRow'>";
      item["日付"].forEach(d=>{
        html += "<td>" + d + "</td>";
      });
      html += "</tr>";

      html += "<tr>";
      item["数量"].forEach(q=>{
        html += "<td>" + q + "</td>";
      });
      html += "</tr>";

      html += "</table>";
    }

    div.innerHTML = html;
    result.appendChild(div);
  });

}
</script>

</body>
</html>
