<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>廣澤S/S生産在庫ポータル</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg:         #0f1923;
    --bg2:        #1e2a38;
    --bg3:        #16202c;
    --surface:    #1e2a38;
    --border:     #2e3d52;
    --accent:     #1a7f5a;
    --accent-lt:  #22a876;
    --gold:       #c8a84b;
    --text:       #e2e8f0;
    --text-muted: #8fa3bc;
    --text-dim:   #4a5f78;
    --font: 'Noto Sans JP', '游ゴシック', 'Yu Gothic', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-weight: 400;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(26,127,90,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,127,90,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* ヘッダー */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 58px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 24px rgba(0,0,0,0.4);
  }

  .header-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .header-title {
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.06em; white-space: nowrap;
  }
  .header-title span { color: var(--accent-lt); }

  .header-sep { width: 1px; height: 24px; background: var(--border); }

  .header-sub {
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 0.08em; white-space: nowrap;
  }

  .header-spacer { flex: 1; min-width: 0; }

  .header-badge {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.12em; color: var(--accent-lt);
    border: 1px solid var(--accent);
    padding: 3px 8px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }

  /* メイン */
  .main {
    position: relative; z-index: 1;
    max-width: 880px;
    margin: 0 auto;
    padding: 44px 20px 72px;
  }

  /* ヒーロー */
  .hero {
    text-align: center;
    margin-bottom: 44px;
    animation: fadeUp 0.55s ease both;
  }

  .hero-eyebrow {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.18em; color: var(--accent-lt);
    text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .hero-eyebrow::before, .hero-eyebrow::after {
    content: ''; display: block;
    width: 28px; height: 1px;
    background: var(--accent); opacity: 0.6;
  }

  .hero-title {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 700; letter-spacing: 0.04em; line-height: 1.35;
  }

  /* セクションラベル */
  .section-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* カードグリッド */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 36px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 20px 48px;
    text-decoration: none; color: inherit;
    display: flex; flex-direction: column; gap: 10px;
    position: relative; overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    animation: fadeUp 0.55s ease both;
    min-width: 0;
  }

  .card:nth-child(1) { animation-delay: 0.10s; }
  .card:nth-child(2) { animation-delay: 0.17s; }
  .card:nth-child(3) { animation-delay: 0.24s; }
  .card:nth-child(4) { animation-delay: 0.31s; }

  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-color, var(--accent));
    border-radius: 12px 12px 0 0;
    opacity: 0; transition: opacity 0.18s ease;
  }

  .card.active:hover {
    transform: translateY(-4px);
    border-color: var(--card-color, var(--accent));
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px var(--card-color, var(--accent));
  }
  .card.active:hover::before { opacity: 1; }
  .card.active:hover .card-icon-wrap { background: var(--card-icon-hover); }
  .card.active:hover .card-arrow {
    background: var(--card-color, var(--accent));
    border-color: var(--card-color, var(--accent));
    transform: translate(2px, -2px);
  }
  .card.active:hover .card-arrow svg { stroke: #fff; }

  .card-icon-wrap {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--card-icon-bg);
    border: 1px solid var(--card-icon-border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.18s ease;
  }

  .card-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 2px;
  }

  .card-title {
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.03em; line-height: 1.3;
    word-break: keep-all;
  }

  .card-arrow {
    position: absolute; right: 16px; bottom: 16px;
    width: 26px; height: 26px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
  }
  .card-arrow svg { stroke: var(--text-dim); transition: stroke 0.18s ease; }

  .badge-coming {
    position: absolute; top: 14px; right: 14px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    padding: 2px 8px; border-radius: 4px;
    background: rgba(200,168,75,0.15);
    border: 1px solid rgba(200,168,75,0.4);
    color: var(--gold); text-transform: uppercase;
  }

  /* フッター */
  .footer {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
    padding: 18px 20px; text-align: center;
    font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* スマホ */
  @media (max-width: 520px) {
    .header-sep, .header-sub { display: none; }
    .header { padding: 0 14px; gap: 10px; }
    .main { padding: 28px 12px 56px; }
    .hero { margin-bottom: 32px; }
    .card-grid { grid-template-columns: 1fr; gap: 10px; }
    .card { padding: 18px 16px 44px; }
    .card-title { font-size: 15px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-icon">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="2" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.9"/>
      <rect x="11" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
      <rect x="2" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
      <rect x="11" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.3"/>
    </svg>
  </div>
  <span class="header-title">筑波工場<span>生産ポータル</span></span>
  <div class="header-sep"></div>
  <span class="header-sub">PRODUCTION MANAGEMENT SYSTEM</span>
  <div class="header-spacer"></div>
  <span class="header-badge">Internal</span>
</header>

<main class="main">

  <div class="hero">
    <div class="hero-eyebrow">Production Management Portal</div>
    <h1 class="hero-title">在庫・生産情報<br>参照システム</h1>
  </div>

  <div class="section-label">在庫参照 — Inventory Search</div>
  <div class="card-grid">

    <a class="card active" href="tanpin-search.html"
       style="--card-color:#1a7f5a; --card-icon-bg:rgba(26,127,90,0.15); --card-icon-border:rgba(26,127,90,0.5); --card-icon-hover:rgba(26,127,90,0.3);">
      <div class="card-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a7f5a" stroke-width="1.8">
          <rect x="3" y="3" width="8" height="8" rx="1.5"/>
          <rect x="13" y="3" width="8" height="8" rx="1.5"/>
          <rect x="3" y="13" width="8" height="8" rx="1.5"/>
          <path d="M17 13v8M13 17h8" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="card-label" style="color:#22a876">Part Viewer</div>
        <div class="card-title">単品在庫検索</div>
      </div>
      <div class="card-arrow">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.5 9.5l7-7M3.5 2.5h6v6"/>
        </svg>
      </div>
    </a>

    <a class="card active" href="unit-search.html"
       style="--card-color:#4a90d9; --card-icon-bg:rgba(74,144,217,0.12); --card-icon-border:rgba(74,144,217,0.4); --card-icon-hover:rgba(74,144,217,0.25);">
      <div class="card-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4a90d9" stroke-width="1.8">
          <path d="M4 6h16M4 10h16M4 14h10M4 18h7" stroke-linecap="round"/>
          <circle cx="18" cy="17" r="3.5"/>
          <path d="M20.5 19.5l2 2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="card-label" style="color:#7ab8f5">Unit Viewer</div>
        <div class="card-title">ユニット在庫検索</div>
      </div>
      <div class="card-arrow">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.5 9.5l7-7M3.5 2.5h6v6"/>
        </svg>
      </div>
    </a>

  </div>

  <div class="section-label">生産実績 — Production Records</div>
  <div class="card-grid">

    <a class="card" href="#"
       style="--card-color:#c8a84b; --card-icon-bg:rgba(200,168,75,0.10); --card-icon-border:rgba(200,168,75,0.35); opacity:0.6; pointer-events:none; cursor:default;">
     
      <div class="card-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c8a84b" stroke-width="1.8">
          <path d="M9 3H5a2 2 0 00-2 2v4M9 3h6M9 3v18m6-18h4a2 2 0 012 2v4M15 3v18M9 21h6M3 9h18M3 15h18" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="card-label" style="color:#c8a84b">Production Viewer</div>
        <div class="card-title">加工実績参照　準備中</div>
      </div>
      <div class="card-arrow">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.5 9.5l7-7M3.5 2.5h6v6"/>
        </svg>
      </div>
    </a>

    <a class="card" href="#"
       style="--card-color:#e05252; --card-icon-bg:rgba(224,82,82,0.10); --card-icon-border:rgba(224,82,82,0.35); opacity:0.6; pointer-events:none; cursor:default;">
      <div class="card-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#e05252" stroke-width="1.8">
          <path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3" stroke-linecap="round"/>
          <rect x="9" y="11" width="14" height="10" rx="2"/>
          <path d="M16 11V8M9 15h2M9 18h2" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="card-label" style="color:#e07575">Shipment Viewer</div>
        <div class="card-title">出荷実績参照　準備中</div>
      </div>
      <div class="card-arrow">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2.5 9.5l7-7M3.5 2.5h6v6"/>
        </svg>
      </div>
    </a>

  </div>

</main>

<footer class="footer">
  © ㈱廣澤精機製作所 筑波工場 &nbsp;—&nbsp; Internal Use Only
</footer>

</body>
</html>
