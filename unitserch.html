<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>結合データビューア</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #00d4aa;
    --accent2: #0ea5e9;
    --text: #e6edf3;
    --text-muted: #7d8590;
    --text-dim: #484f58;
    --row-hover: rgba(255,255,255,0.04);
    --header-h: 56px;
    --status-h: 36px;
    --pager-h: 52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    overscroll-behavior: none;
  }

  /* ══ ヘッダー ══ */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    z-index: 200;
  }

  .logo {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    white-space: nowrap;
    display: none;
  }
  @media (min-width: 480px) { .logo { display: block; } }

  .search-wrap {
    flex: 1;
    position: relative;
    min-width: 0;
  }

  .search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
    color: var(--text-dim);
  }

  #searchInput {
    width: 100%;
    height: 40px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 0 36px 0 36px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,170,.15);
  }
  #searchInput::placeholder { color: var(--text-dim); font-size: 13px; }

  #clearBtn {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 6px;
    display: none;
    line-height: 1;
  }
  #clearBtn.visible { display: block; }

  .file-btn {
    flex-shrink: 0;
    height: 40px;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 0 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .file-btn:active { opacity: 0.75; }
  #fileInput { display: none; }

  /* ══ プログレスバー ══ */
  #progressWrap {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    height: 3px;
    background: var(--border);
    z-index: 300;
    display: none;
  }
  #progressBar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .15s;
  }

  /* ══ ステータスバー ══ */
  .status-bar {
    position: fixed;
    top: var(--header-h); left: 0; right: 0;
    height: var(--status-h);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-muted);
    z-index: 190;
    overflow: hidden;
  }
  .status-bar .cnt { color: var(--accent); font-weight: 700; }
  .status-tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 10px;
    white-space: nowrap;
  }
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══ ドロップゾーン（初期画面） ══ */
  #dropZone {
    position: fixed;
    top: calc(var(--header-h) + var(--status-h));
    left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px;
    text-align: center;
  }
  .drop-icon { font-size: 56px; }
  .drop-title { font-size: 16px; font-weight: 500; color: var(--text); }
  .drop-sub {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.8;
    max-width: 320px;
  }
  .drop-sub strong { color: var(--accent2); }
  .drop-btn {
    height: 52px;
    background: var(--accent);
    color: #0d1117;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 0 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: opacity .2s;
    margin-top: 8px;
  }
  .drop-btn:active { opacity: 0.75; }

  /* ══ テーブルエリア ══ */
  #tableArea {
    display: none;
    position: fixed;
    top: calc(var(--header-h) + var(--status-h));
    left: 0; right: 0;
    bottom: var(--pager-h);
    overflow: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    border-collapse: collapse;
    font-size: 12px;
    min-width: 100%;
  }

  thead th {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--surface);
    color: var(--text-muted);
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 10px;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }
  thead th:first-child { border-left: 3px solid var(--accent); }

  tbody tr { border-bottom: 1px solid var(--border); }
  @media (hover: hover) {
    tbody tr:hover { background: var(--row-hover); }
  }

  tbody td {
    padding: 9px 10px;
    white-space: nowrap;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text);
  }

  .c-oya   { color: var(--accent); font-weight: 500; }
  .c-busho { color: var(--accent2); }
  .c-buban { color: #a5b4fc; }
  .c-nan   { color: var(--text-dim); font-size: 10px; }
  .c-date  { text-align: right; min-width: 54px; }
  .c-dval  { color: #fbbf24; }
  .c-dzero { color: var(--text-dim); }

  mark {
    background: rgba(0,212,170,.28);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 1px;
  }

  .empty-row td {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-dim);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* ══ ページネーション ══ */
  .pager {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--pager-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: none;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    z-index: 200;
  }
  .pager.visible { display: flex; }

  .pg-btn {
    height: 38px;
    min-width: 68px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    font-family: 'Share Tech Mono', monospace;
    cursor: pointer;
    transition: border-color .15s, color .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-appearance: none;
  }
  .pg-btn:active  { border-color: var(--accent); color: var(--accent); }
  @media (hover: hover) {
    .pg-btn:hover { border-color: var(--accent); color: var(--accent); }
  }
  .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .pg-info {
    flex: 1;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }
  .pg-info span { color: var(--accent); font-weight: 700; }

  .pg-size {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    padding: 0 8px;
    height: 38px;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .pg-size:focus { border-color: var(--accent); }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <span class="logo">VIEWER</span>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput"
      placeholder="親部番＆中間 をあいまい検索..."
      autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false" />
    <button id="clearBtn" onclick="clearSearch()" aria-label="クリア">✕</button>
  </div>

</div>

<!-- プログレスバー -->
<div id="progressWrap"><div id="progressBar"></div></div>

<!-- ステータスバー -->
<div class="status-bar">
  <span id="statusMsg">JSONファイルを読み込んでください</span>
</div>

<!-- 初期画面 -->
<div id="dropZone">
  <div class="drop-icon">📋</div>
  <div class="drop-title">結合データビューア</div>
  <div class="drop-sub" id="dropSub">データを読み込んでいます...</div>
</div>

<!-- テーブルエリア -->
<div id="tableArea">
  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- ページネーション -->
<div class="pager" id="pager">
  <button class="pg-btn" id="prevBtn" onclick="changePage(-1)">◀ 前へ</button>
  <div class="pg-info" id="pageInfo"></div>
  <button class="pg-btn" id="nextBtn" onclick="次へ">次へ ▶</button>
  <select class="pg-size" id="pageSizeSelect" onchange="changePageSize(this.value)">
    <option value="50">50行</option>
    <option value="100" selected>100行</option>
    <option value="200">200行</option>
    <option value="500">500行</option>
  </select>
</div>

<script>
'use strict';

let allData      = [];
let filteredData = [];
let dateColumns  = [];
let currentPage  = 0;
let pageSize     = 100;
let searchQuery  = '';
let debounceTimer;
let pgTimer;



/* ── 自動fetch読み込み ── */
(async function autoLoad() {
  setProgress(true);
  setStatus('<span class="spinner"></span>&nbsp;データ読み込み中...');
  try {
    const res = await fetch('./ketsugou.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    parseJSON(json);
  } catch(err) {
    setProgress(false);
    document.getElementById('dropSub').innerHTML =
      `⚠️ 自動読み込み失敗: ${err.message}<br>ketsugou.json と同じフォルダに置いてください`;
    setStatus('❌ 読み込み失敗');
  }
})();

function parseJSON(json) {
  // UI をブロックしないよう次フレームで処理
  setTimeout(() => {
    try {
      const json2 = Array.isArray(json) ? json : JSON.parse(json);
      if (!Array.isArray(json2)) throw new Error('配列形式のJSONが必要です');
      allData = json2;
      buildDateColumns();
      searchQuery = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').classList.remove('visible');
      applyFilter();
      setProgress(false);
document.getElementById('dropZone').style.display = 'none';
      document.getElementById('tableArea').style.display = 'block';
      document.getElementById('pager').classList.add('visible');
    } catch(err) {
      setProgress(false);
      setStatus('❌ 解析エラー: ' + err.message);
      alert('JSONの解析に失敗しました:\n' + err.message);
    }
  }, 0);
}

function buildDateColumns() {
  const set = new Set();
  for (const row of allData) {
    if (row['日付'] && typeof row['日付'] === 'object') {
      for (const k of Object.keys(row['日付'])) set.add(k);
    }
  }
  dateColumns = Array.from(set);

  // ヘッダー（一度だけ構築）
  const fixed = ['親部番＆中間','ホトム部番','部署','部番'];
  let h = '<tr>';
  for (const c of fixed) h += `<th>${esc(c)}</th>`;
  for (const d of dateColumns) h += `<th class="c-date">${esc(d)}</th>`;
  h += '</tr>';
  document.getElementById('tableHead').innerHTML = h;
}

/* ── 検索 ── */
document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('clearBtn').classList.toggle('visible', this.value.length > 0);
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQuery = this.value.trim();
    currentPage = 0;
    applyFilter();
  }, 200);
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  searchQuery = '';
  currentPage = 0;
  applyFilter();
}

function applyFilter() {
  if (!searchQuery) {
    filteredData = allData;
  } else {
    const q = searchQuery.toLowerCase();
    filteredData = allData.filter(r =>
      (r['親部番＆中間'] || '').toLowerCase().includes(q)
    );
  }
  renderPage();
  updateStatus();
}

/* ── テーブル描画 ── */
function renderPage() {
  const start = currentPage * pageSize;
  const end   = Math.min(start + pageSize, filteredData.length);
  const rows  = filteredData.slice(start, end);
  const buf   = [];

  if (rows.length === 0) {
    buf.push(`<tr class="empty-row"><td colspan="${4 + dateColumns.length}">該当データがありません</td></tr>`);
  } else {
    for (const row of rows) {
      buf.push('<tr>');
      buf.push(`<td class="c-oya">${hi(row['親部番＆中間'] || '', searchQuery)}</td>`);
      buf.push(`<td>${esc(row['ホトム部番'] || '')}</td>`);
      buf.push(nanCell(row['部署'], 'c-busho'));
      buf.push(nanCell(row['部番'],  'c-buban'));
      const dates = row['日付'] || {};
      for (const d of dateColumns) {
        const v = dates[d];
        if (v === undefined || v === null) {
          buf.push('<td class="c-date c-nan">—</td>');
        } else if (v === 0) {
          buf.push('<td class="c-date c-dzero">0</td>');
        } else {
          buf.push(`<td class="c-date c-dval">${v.toLocaleString()}</td>`);
        }
      }
      buf.push('</tr>');
    }
  }

  document.getElementById('tableBody').innerHTML = buf.join('');
  document.getElementById('tableArea').scrollTop = 0;

  // ページャー
  const total = Math.ceil(filteredData.length / pageSize) || 1;
  document.getElementById('pageInfo').innerHTML =
    `<span>${currentPage + 1}</span> / <span>${total}</span>`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= total - 1;
}

function nanCell(v, cls) {
  if (!v || v === 'nan') return '<td class="c-nan">—</td>';
  return `<td class="${cls}">${esc(v)}</td>`;
}

/* ── ページング ── */
function changePage(dir) {
  const total = Math.ceil(filteredData.length / pageSize);
  currentPage = Math.max(0, Math.min(currentPage + dir, total - 1));
  renderPage();
}

function changePageSize(val) {
  pageSize    = parseInt(val);
  currentPage = 0;
  renderPage();
}

// 次へボタンのonclick修正
document.getElementById('nextBtn').onclick = () => changePage(1);

/* ── ステータス ── */
function updateStatus() {
  let h = `総件数: <span class="cnt">${allData.length.toLocaleString()}</span>`;
  h += `&nbsp;&nbsp;表示: <span class="cnt">${filteredData.length.toLocaleString()}</span>`;
  if (searchQuery) h += `&nbsp;<span class="status-tag">🔍 "${esc(searchQuery)}"</span>`;
  if (dateColumns.length) h += `&nbsp;<span class="status-tag">📅 ${dateColumns.length}日</span>`;
  setStatus(h);
}

function setStatus(html) {
  document.getElementById('statusMsg').innerHTML = html;
}

/* ── プログレスバー ── */
function setProgress(show) {
  const wrap = document.getElementById('progressWrap');
  const bar  = document.getElementById('progressBar');
  clearInterval(pgTimer);
  if (show) {
    wrap.style.display = 'block';
    let w = 5;
    bar.style.width = w + '%';
    pgTimer = setInterval(() => {
      w = Math.min(w + Math.random() * 12, 88);
      bar.style.width = w + '%';
    }, 150);
  } else {
    bar.style.width = '100%';
    setTimeout(() => {
      wrap.style.display = 'none';
      bar.style.width = '0%';
    }, 350);
  }
}

/* ── ユーティリティ ── */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hi(text, query) {
  if (!query) return esc(text);
  const e = esc(text);
  const q = esc(query).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return e.replace(new RegExp(q,'gi'), m => `<mark>${m}</mark>`);
}
</script>
</body>
</html>
