<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>工程検索</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 10px;
}

/* 検索UI */
.search-box {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-bottom: 15px;
}

.search-box input {
  width: 250px;
  max-width: 80%;
  padding: 10px;
  font-size: 16px;
}

.search-box button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}

/* テーブル */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
  font-size: 12px;
}

th {
  background: #333;
  color: white;
}
</style>
</head>

<body>

<h2 style="text-align:center;">工程検索（親部番＆中間）</h2>

<div class="search-box">
  <input type="text" id="search" placeholder="例：408 / 430">
  <button onclick="search()">検索</button>
</div>

<table id="result"></table>

<script>
let masterData = [];

// JSON読み込み
fetch("schedule.json")
.then(res => res.json())
.then(data => {
    masterData = data;
    render(data);
});

// nan対策
function clean(val){
    if(!val || val === "nan") return "";
    return val;
}

// 表示
function render(list){
    const table = document.getElementById("result");

    if(list.length === 0){
        table.innerHTML = "データなし";
        return;
    }

    const dates = Object.keys(list[0].日付);

    let html = "<tr>";
    html += "<th>親部番＆中間</th><th>ホトム部番</th><th>部署</th><th>部番</th>";
    dates.forEach(d => html += `<th>${d}</th>`);
    html += "</tr>";

    list.forEach(item => {
        html += "<tr>";

        html += `<td>${clean(item["親部番＆中間"])}</td>`;
        html += `<td>${clean(item["ホトム部番"])}</td>`;
        html += `<td>${clean(item["部署"])}</td>`;
        html += `<td>${clean(item["部番"])}</td>`;

        dates.forEach(d => {
            html += `<td>${item["日付"][d] ?? ""}</td>`;
        });

        html += "</tr>";
    });

    table.innerHTML = html;
}

// 検索（親部番＆中間のみ）
function search(){
    const key = document.getElementById("search").value.trim();

    if(key === ""){
        render(masterData);
        return;
    }

    const filtered = masterData.filter(item =>
        (item["親部番＆中間"] || "").includes(key)
    );

    render(filtered);
}

// Enterキー対応
document.getElementById("search").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        search();
    }
});
</script>

</body>
</html>
