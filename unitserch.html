<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>工程検索</title>
<style>
body { font-family: sans-serif; background:#f5f5f5; padding:10px;}
.search-box {
  display:flex;
  justify-content:center;
  gap:5px;
  margin-bottom:15px;
}
.search-box input {
  width:250px;
  padding:10px;
  font-size:16px;
}
.search-box button {
  padding:10px 20px;
  font-size:16px;
}
table {
  width:100%;
  border-collapse:collapse;
  background:white;
}
th,td {
  border:1px solid #ccc;
  padding:6px;
  text-align:center;
  font-size:12px;
}
th {
  background:#333;
  color:white;
}
</style>
</head>
<body>
<h2 style="text-align:center;">工程検索</h2>
<div class="search-box">
  <input type="text" id="search" placeholder="例：408">
  <button onclick="search()">検索</button>
</div>
<table id="result"></table>
<script>
let masterData = [];
let allDates = []; // ★ 全データから収集した日付列を保持

fetch("ketsugou.json")
.then(res => res.json())
.then(data => {
    masterData = data;
    allDates = getAllDates(data); // ★ 全データから日付を収集
    render(data);
});

function clean(val){
    if(!val || val === "nan") return "";
    return val;
}

// ★ 全レコードを走査して日付キーを収集（順序を保持）
function getAllDates(list){
    const seen = new Set();
    const result = [];
    for(let item of list){
        const keys = Object.keys(item["日付"] || {});
        for(let k of keys){
            if(!seen.has(k)){
                seen.add(k);
                result.push(k);
            }
        }
    }
    return result;
}

function render(list){
    const table = document.getElementById("result");
    if(list.length === 0){
        table.innerHTML = "<tr><td colspan='100'>データなし</td></tr>";
        return;
    }

    let html = "<tr>";
    html += "<th>親部番＆中間</th><th>ホトム部番</th><th>部署</th><th>部番</th>";
    allDates.forEach(d => html += `<th>${d}</th>`);
    html += "</tr>";

    list.forEach(item => {
        html += "<tr>";
        html += `<td>${clean(item["親部番＆中間"])}</td>`;
        html += `<td>${clean(item["ホトム部番"])}</td>`;
        html += `<td>${clean(item["部署"])}</td>`;
        html += `<td>${clean(item["部番"])}</td>`;
        allDates.forEach(d => {
            const val = (item["日付"] || {})[d];
            html += `<td>${val !== undefined ? val : ""}</td>`;
        });
        html += "</tr>";
    });

    table.innerHTML = html;
}

// ★ 親部番＆中間 でのあいまい検索
function search(){
    const key = document.getElementById("search").value.trim();
    if(key === ""){
        render(masterData);
        return;
    }
    const filtered = masterData.filter(item =>
        String(item["親部番＆中間"] || "").includes(key)
    );
    render(filtered);
}

// Enter キー対応
document.getElementById("search").addEventListener("keypress", function(e){
    if(e.key === "Enter") search();
});
</script>
</body>
</html>
