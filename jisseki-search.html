<title>実績検索</title>

<style>
  :root {
    --bg:        #f4f6f8;
    --surface:   #ffffff;
    --border:    #d0d7de;
    --accent:    #1a7f5a;
    --header-bg: #1e2a38;
    --text:      #1a1f27;
    --text-muted:#5a6474;
    --text-dim:  #9aa3af;
    --header-h:  100px;
    --status-h:  32px;
    --font: '游ゴシック','Yu Gothic','YuGothic','Noto Sans JP',sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-weight: 500;
  }

  /* ══ ヘッダー ══ */
  .header {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--header-bg);
    border-bottom: 1px solid #0a111a;
    display: flex; flex-direction: column;
    justify-content: center; gap: 6px;
    padding: 8px 12px; z-index: 300;
  }
  .header-row { display: flex; align-items: center; gap: 6px; }

  .search-wrap { flex: 1; position: relative; min-width: 0; }
  .search-icon {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%); font-size: 13px;
    pointer-events: none; color: #9aa3af;
  }
  .search-input {
    width: 100%; height: 28px;
    background: #2c3a4a; border: 1.5px solid #3e5068;
    border-radius: 8px; color: #e8edf3;
    font-family: var(--font); font-size: 12px;
    padding: 0 28px 0 28px; outline: none;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
  }
  .search-input:focus { border-color: #7dd3b0; box-shadow: 0 0 0 3px rgba(125,211,176,.18); }
  .search-input::placeholder { color: #5a6474; font-size: 11px; }

  .clear-btn {
    position: absolute; right: 7px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; color: #5a6474;
    font-size: 14px; cursor: pointer; padding: 4px 5px;
    display: none; line-height: 1;
  }
  .clear-btn.visible { display: block; }

  /* 日付入力行 */
  .date-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: #9aa3af;
  }
  .date-label { white-space: nowrap; font-size: 10px; color: #7dd3b0; font-weight: 700; }
  .date-input {
    height: 26px; background: #2c3a4a; border: 1.5px solid #3e5068;
    border-radius: 7px; color: #e8edf3;
    font-family: var(--font); font-size: 11px;
    padding: 0 8px; outline: none; flex: 1; min-width: 0;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  .date-input:focus { border-color: #7dd3b0; }
  .date-sep { color: #5a6474; font-size: 11px; flex-shrink: 0; }

  /* 検索ボタン */
  .search-btn {
    flex-shrink: 0; height: 28px; padding: 0 14px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-family: var(--font); font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: opacity .15s;
  }
  .search-btn:active { opacity: 0.75; }

  /* ══ ヘッダーボタン行 ══ */
  .header-btn-row { display: flex; align-items: center; gap: 6px; }
  .hdr-btn {
    flex: 1; height: 24px;
    border: none; border-radius: 7px;
    font-size: 10px; font-weight: 700; font-family: var(--font);
    cursor: pointer; white-space: nowrap;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: opacity .15s, transform .1s;
  }
  .hdr-btn:active { opacity: .75; transform: scale(.97); }
  .hdr-btn-reload { background: #2a7f5a; color: #e0f5ec; }
  .hdr-btn-tanpin { background: #2a5a9f; color: #ddeeff; }
  .hdr-btn-unit   { background: #5a4aa0; color: #e8e4ff; }
  .hdr-btn-shukka { background: #8a4a20; color: #fde8d8; }

  /* ══ プログレスバー ══ */
  #progressWrap {
    position: fixed; top: var(--header-h); left: 0; right: 0;
    height: 3px; background: #d0d7de; z-index: 400; display: none;
  }
  #progressBar { height: 100%; background: var(--accent); width: 0%; transition: width .15s; }

  /* ══ ステータスバー ══ */
  .status-bar {
    position: fixed; top: var(--header-h); left: 0; right: 0;
    height: var(--status-h); background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    font-size: 10px; font-family: var(--font);
    color: var(--text-muted); z-index: 290; overflow: hidden;
  }
  .status-bar .cnt { color: var(--accent); font-weight: 700; }
  .status-tag {
    background: #eef1f4; border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 7px; font-size: 10px; white-space: nowrap;
  }
  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    display: inline-block; vertical-align: middle; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══ コンテンツエリア ══ */
  #content {
    padding: calc(var(--header-h) + var(--status-h) + 14px) 12px 32px;
  }

  /* ══ 初期表示 ══ */
  .placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 60px 24px; text-align: center;
  }
  .placeholder .icon { font-size: 48px; }
  .placeholder p { font-size: 13px; color: var(--text-muted); line-height: 1.8; }
  .hint {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px;
    font-size: 12px; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
  }

  /* ══ セクションタイトル ══ */
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    color: var(--text-muted);
    padding: 8px 0 6px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .section-title .badge {
    background: var(--accent); color: #fff;
    border-radius: 10px; padding: 1px 8px;
    font-size: 10px; font-weight: 700;
  }

  /* ══ 工程情報カード（koutei） ══ */
  .koutei-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap;
  }
  .koutei-code { font-weight: 700; font-size: 13px; color: #1a5c3a; min-width: 120px; }
  .koutei-lot  { font-size: 11px; color: var(--text-muted); min-width: 60px; align-self: center; }
  .koutei-steps { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .koutei-step {
    padding: 3px 10px; background: #eef1f4; border: 1px solid var(--border);
    border-radius: 12px; font-size: 11px; white-space: nowrap;
  }

  /* ══ 実績ブロック ══ */
  .jisseki-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 12px; overflow: hidden;
  }
  .jisseki-block-header {
    background: #2c3a4a; padding: 8px 14px;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .jisseki-buban { font-size: 13px; font-weight: 700; color: #ffffff; }
  .jisseki-total-badge {
    margin-left: auto;
    font-size: 11px; color: #7dd3b0;
    background: rgba(125,211,176,.18); border: 1px solid rgba(125,211,176,.3);
    border-radius: 10px; padding: 2px 10px; white-space: nowrap;
  }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table {
    border-collapse: separate; border-spacing: 0;
    font-size: 12px; min-width: 100%;
    font-family: var(--font); white-space: nowrap;
  }
  thead th {
    background: #3a4f62; color: #c8d4e0;
    font-weight: 700; font-size: 10px; letter-spacing: 0.04em;
    padding: 7px 12px; border-bottom: 2px solid #1a2836;
    border-right: 1px solid #2c3a4a; text-align: center;
  }
  thead th:last-child { border-right: none; }
  tbody td {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border); font-size: 12px;
  }
  tbody td:last-child { border-right: none; }
  tbody tr:last-child td { border-bottom: none; }
  .td-right { text-align: right; }
  .td-center { text-align: center; }

  /* 数量の色 */
  .c-minus { color: #d93025 !important; font-weight: 700; }
  .c-zero  { color: var(--text-dim); }
  .c-plus  { color: #1a7f5a; font-weight: 700; }

  mark { border-radius: 2px; padding: 0 1px; }
  .koutei-code mark { background: none; color: #1a5c3a; font-weight: 900; text-decoration: underline 2px #1a7f5a; }
  .jisseki-buban mark { background: rgba(255,220,80,.35); color: #ffffff; }

  .no-result {
    padding: 20px; text-align: center;
    font-size: 12px; color: var(--text-dim);
  }

  /* ══ 集計サマリーカード ══ */
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 12px;
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
  }
  .summary-item { display: flex; flex-direction: column; gap: 2px; }
  .summary-label { font-size: 10px; color: var(--text-muted); }
  .summary-value { font-size: 16px; font-weight: 700; color: var(--accent); }
  .summary-value.neg { color: #d93025; }

  /* スマホ縦 */
  @media (max-width: 480px) and (orientation: portrait) {
    tbody td, thead th { padding: 6px 8px; font-size: 10px; }
    .summary-value { font-size: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <!-- 第1段：部番検索 -->
  <div class="header-row">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" class="search-input"
        placeholder="部番を入力..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      <button class="clear-btn" id="clearBtn" onclick="clearSearch()" aria-label="クリア">✕</button>
    </div>
    <button class="search-btn" onclick="execSearch()">検索</button>
  </div>
  <!-- 第2段：日付範囲 -->
  <div class="date-row">
    <span class="date-label">日付</span>
    <input type="date" id="dateFrom" class="date-input">
    <span class="date-sep">〜</span>
    <input type="date" id="dateTo" class="date-input">
  </div>
  <!-- 第3段：ボタン行 -->
  <div class="header-btn-row">
    <button class="hdr-btn hdr-btn-reload" onclick="forceReload()">🔄 強制読込</button>
    <button class="hdr-btn hdr-btn-tanpin" onclick="window.open('https://mgunshi3060.github.io/zaiko-app/tanpin-search.html','_blank')">⚙️ 単品検索</button>
    <button class="hdr-btn hdr-btn-unit" onclick="window.open('https://mgunshi3060.github.io/zaiko-app/unit-search.html','_blank')">🔍 ユニット検索</button>
    <button class="hdr-btn hdr-btn-shukka" onclick="window.open('./shukka-search.html','_blank')">📦 出荷検索</button>
  </div>
</div>

<div id="progressWrap"><div id="progressBar"></div></div>

<div class="status-bar">
  <span id="statusMsg"><span class="spinner"></span>&nbsp;データを読み込んでいます...</span>
</div>

<div id="content">
  <div class="placeholder" id="placeholder">
    <div class="icon">📊</div>
    <p>部番を入力して「検索」または Enter を押してください<br>日付範囲を指定すると期間絞り込みができます</p>
    <div class="hint">💡 部番の一部でも検索できます</div>
  </div>
  <div id="results" style="display:none"></div>
</div>

<script>
'use strict';

let kouteiData  = [];
let jissekiData = [];   // 実績JSON（Python変換済み想定）
let pgTimer;
let dataReady   = false;
let jsonUpdatedAt = '';

/* ── 土日判定（日付文字列から） ── */
function getDayType(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return '';
  const day = d.getDay();
  if (day === 0) return 'sun';
  if (day === 6) return 'sat';
  return '';
}

/* ── Last-Modified フォーマット ── */
function formatLastModified(headerVal) {
  if (!headerVal) return '';
  const d = new Date(headerVal);
  if (isNaN(d)) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* ── 日付を YYYY/MM/DD 形式に正規化 ── */
function normalizeDate(s) {
  if (!s) return '';
  return String(s).replace(/-/g, '/');
}

/* ── 日付比較用に YYYY-MM-DD（ゼロパディングあり）に変換 ── */
function toComparable(s) {
  if (!s) return '';
  // YYYY/MM/DD または YYYY-MM-DD 形式を統一して YYYY-MM-DD に
  const str = String(s).replace(/\//g, '-').trim();
  // M/D がゼロパディングなしの場合に対応: YYYY-M-D → YYYY-MM-DD
  const m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:T.*)?$/);
  if (m) {
    return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  }
  return str.slice(0, 10); // それ以外はそのまま先頭10文字
}

/* ── 2ファイル並列fetch（自動読み込み） ── */
(async function autoLoad() {
  setProgress(true);
  try {
    const [rk, rj] = await Promise.all([
      fetch('./koutei.json'),
      fetch('./jisseki.json'),
    ]);
    if (!rk.ok) throw 'koutei ' + rk.status;
    if (!rj.ok) throw 'jisseki ' + rj.status;
    jsonUpdatedAt = formatLastModified(rj.headers.get('Last-Modified'));
    const [kj, jj] = await Promise.all([rk.json(), rj.json()]);
    kouteiData  = Array.isArray(kj) ? kj : [];
    jissekiData = Array.isArray(jj) ? jj : [];
    dataReady   = true;
    setProgress(false);
    updateStatus();
    // デフォルト日付範囲をセット（データの最古〜最新）
    setDefaultDates();
  } catch(err) {
    setProgress(false);
    setStatus(`❌ 読み込み失敗: ${err}`);
  }
})();

/* ── デフォルト日付範囲をデータから自動設定 ── */
function setDefaultDates() {
  const now = new Date();
  const fromDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const toDate   = new Date(now.getFullYear(), now.getMonth() + 1, 0);
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('dateFrom').value =
    `${fromDate.getFullYear()}-${pad(fromDate.getMonth()+1)}-${pad(fromDate.getDate())}`;
  document.getElementById('dateTo').value =
    `${toDate.getFullYear()}-${pad(toDate.getMonth()+1)}-${pad(toDate.getDate())}`;
}

/* ── JSON強制読込 ── */
async function forceReload() {
  dataReady = false;
  setProgress(true);
  setStatus('<span class="spinner"></span>&nbsp;データを読み込んでいます...');
  const t = Date.now();
  try {
    const [rk, rj] = await Promise.all([
      fetch('./koutei.json?_=' + t, { cache: 'no-store' }),
      fetch('./jisseki.json?_=' + t, { cache: 'no-store' }),
    ]);
    if (!rk.ok) throw 'koutei ' + rk.status;
    if (!rj.ok) throw 'jisseki ' + rj.status;
    jsonUpdatedAt = formatLastModified(rj.headers.get('Last-Modified'));
    const [kj, jj] = await Promise.all([rk.json(), rj.json()]);
    kouteiData  = Array.isArray(kj) ? kj : [];
    jissekiData = Array.isArray(jj) ? jj : [];
    dataReady   = true;
    setProgress(false);
    updateStatus();
    setDefaultDates();
  } catch(err) {
    setProgress(false);
    setStatus(`❌ 読み込み失敗: ${err}`);
  }
}

/* ── ステータス更新 ── */
function updateStatus() {
  let h = `工程: <span class="cnt">${kouteiData.length.toLocaleString()}</span>件&nbsp;`
        + `実績: <span class="cnt">${jissekiData.length.toLocaleString()}</span>件`;
  if (jsonUpdatedAt) h += `&nbsp;<span class="status-tag">🕒${jsonUpdatedAt}</span>`;
  h += `&nbsp;—&nbsp;検索ボタンまたはEnterで検索`;
  setStatus(h);
}

/* ── 入力イベント ── */
document.getElementById('searchInput').addEventListener('input', function() {
  document.getElementById('clearBtn').classList.toggle('visible', this.value.length > 0);
});
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); execSearch(); }
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  document.getElementById('results').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('placeholder').style.display = 'flex';
  if (dataReady) updateStatus();
}

/* ── 検索実行 ── */
function execSearch() {
  if (!dataReady) { setStatus('⏳ データ読み込み中です...'); return; }

  const keyword     = document.getElementById('searchInput').value.trim();
  const dateFrom    = document.getElementById('dateFrom').value; // YYYY-MM-DD
  const dateTo      = document.getElementById('dateTo').value;
  const resultsDiv  = document.getElementById('results');
  const placeholder = document.getElementById('placeholder');

  if (!keyword) {
    placeholder.style.display = 'flex';
    resultsDiv.style.display = 'none';
    resultsDiv.innerHTML = '';
    return;
  }

  placeholder.style.display = 'none';
  resultsDiv.style.display = 'block';
  window.scrollTo(0, 0);

  const q = keyword.toLowerCase();

  /* 工程情報フィルタ */
  const kFiltered = kouteiData.filter(item => (item['品番'] || '').toLowerCase().includes(q));

  /* 実績データフィルタ（部番 + 日付範囲） */
  const jFiltered = jissekiData.filter(item => {
    if (!(item['部番'] || '').toLowerCase().includes(q)) return false;
    const d = toComparable(item['日付'] || '');
    if (dateFrom && d < dateFrom) return false;
    if (dateTo   && d > dateTo)   return false;
    return true;
  });

  const buf = [];

  /* ── 工程情報セクション ── */
  const K_LIMIT = 50;
  const kOver = kFiltered.length > K_LIMIT;
  const kShow = kOver ? kFiltered.slice(0, K_LIMIT) : kFiltered;

  buf.push(`<div class="section-title">⚙️ 工程情報 <span class="badge">${kFiltered.length}件</span>${kOver ? `<span style="font-size:10px;color:var(--text-dim)">（上位${K_LIMIT}件）</span>` : ''}</div>`);
  if (kShow.length === 0) {
    buf.push(`<div class="no-result">該当する工程情報がありません</div>`);
  } else {
    for (const item of kShow) {
      const code  = esc(item['品番'] || '');
      const lot   = esc(item['図番'] || '');
      const procs = (item['工程'] || []).filter(p => p && p !== '');
      const steps = procs.map(p => `<span class="koutei-step">${esc(p)}</span>`).join('');
      buf.push(
        `<div class="koutei-card">` +
        `<div class="koutei-code">${hi(code, q)}</div>` +
        `<div class="koutei-lot">${lot}</div>` +
        `<div class="koutei-steps">${steps}</div>` +
        `</div>`
      );
    }
  }

  /* ── 実績情報セクション ── */
  const totalQtyAll = jFiltered.reduce((s, r) => s + (Number(r['数量']) || 0), 0);
  buf.push(`<div class="section-title" style="margin-top:16px">📊 実績情報 <span class="badge">${jFiltered.length}件</span><span style="margin-left:auto;font-size:11px;color:var(--accent);font-weight:700">合計数量: ${totalQtyAll.toLocaleString()}</span></div>`);

  if (jFiltered.length === 0) {
    buf.push(`<div class="no-result">該当する実績データがありません</div>`);
  } else {
    /* 日付昇順 → 部番昇順でソート */
    const sorted = [...jFiltered].sort((a, b) => {
      const da = toComparable(a['日付'] || '');
      const db = toComparable(b['日付'] || '');
      if (da !== db) return da < db ? -1 : 1;
      return (a['部番'] || '') < (b['部番'] || '') ? -1 : 1;
    });

    /* フラットテーブル（エクセルと同じ列構成：部番・工程・日付・数量） */
    let trows = '';
    for (const r of sorted) {
      const buban  = esc(r['部番'] || '');
      const koutei = esc(r['工程'] || '');
      const date   = esc(normalizeDate(r['日付'] || ''));
      const qty    = Number(r['数量']) || 0;
      const qtyStr = qty < 0
        ? `<span class="c-minus">▲${Math.abs(qty).toLocaleString()}</span>`
        : qty === 0
          ? `<span class="c-zero">0</span>`
          : `<span class="c-plus">${qty.toLocaleString()}</span>`;

      trows +=
        `<tr>` +
        `<td class="td-center">${hi(buban, q)}</td>` +
        `<td class="td-center">${koutei}</td>` +
        `<td class="td-center">${date}</td>` +
        `<td class="td-right">${qtyStr}</td>` +
        `</tr>`;
    }

    buf.push(
      `<div class="jisseki-block">` +
      `<div class="table-wrap"><table>` +
      `<thead><tr><th>部番</th><th>工程</th><th>日付</th><th>数量</th></tr></thead>` +
      `<tbody>${trows}</tbody>` +
      `</table></div></div>`
    );
  }

  resultsDiv.innerHTML = buf.join('');

  /* ステータス更新 */
  let sh = `工程: <span class="cnt">${kFiltered.length}</span>件&nbsp;`
         + `実績: <span class="cnt">${jFiltered.length}</span>件&nbsp;`
         + `合計数量: <span class="cnt">${totalQtyAll.toLocaleString()}</span>&nbsp;`
         + `<span class="status-tag">🔍 "${esc(keyword)}"</span>`;
  if (dateFrom || dateTo) {
    sh += `&nbsp;<span class="status-tag">📅 ${dateFrom || '—'} 〜 ${dateTo || '—'}</span>`;
  }
  if (jsonUpdatedAt) sh += `&nbsp;<span class="status-tag">🕒${jsonUpdatedAt}</span>`;
  setStatus(sh);
}

/* ── プログレスバー ── */
function setProgress(show) {
  const wrap = document.getElementById('progressWrap');
  const bar  = document.getElementById('progressBar');
  clearInterval(pgTimer);
  if (show) {
    wrap.style.display = 'block'; let w = 5; bar.style.width = w + '%';
    pgTimer = setInterval(() => { w = Math.min(w + Math.random() * 12, 88); bar.style.width = w + '%'; }, 150);
  } else {
    bar.style.width = '100%';
    setTimeout(() => { wrap.style.display = 'none'; bar.style.width = '0%'; }, 350);
  }
}

function setStatus(html) { document.getElementById('statusMsg').innerHTML = html; }

/* ── ユーティリティ ── */
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hi(escapedText, query) {
  if (!query) return escapedText;
  const q = esc(query).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return escapedText.replace(new RegExp(q,'gi'), m => `<mark>${m}</mark>`);
}
